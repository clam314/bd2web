      --bg: #0b0d12;
      --panel: rgba(22, 25, 33, 0.92);
      --text: #e6e8ee;

      --accent: #6aa6ff;
      --line: rgba(255, 255, 255, 0.07);

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background:

        linear-gradient(135deg, #0b0d12 0%, #11151d 52%, #0b0d12 100%);
      color: var(--text);
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      overflow: hidden;
    }
    body.idle { cursor: none; }

    #stage { position: fixed; inset: 0; }
    #stage .spine-player { background: transparent !important; }
    #hotzone-layer {
      position: fixed;
      inset: 0;
      z-index: 12;
      pointer-events: none;
    }
    .hotzone {
      position: absolute;
      min-width: 26px;
      min-height: 26px;
      border: 1px solid rgba(106, 166, 255, 0.62);
      border-radius: 6px;
      background: rgba(106, 166, 255, 0.12);
      box-shadow: 0 0 0 1px rgba(11, 13, 18, 0.18), inset 0 0 18px rgba(106, 166, 255, 0.12);
      color: #dceaff;
      cursor: pointer;
      pointer-events: auto;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      opacity: 0.72;
      transition: opacity 0.15s, background 0.15s, border-color 0.15s;
    }
    .hotzone:hover {
      opacity: 1;
      background: rgba(106, 166, 255, 0.2);
      border-color: rgba(152, 199, 255, 0.9);
    }
    .hotzone.holding {
      opacity: 1;
      background: rgba(106, 166, 255, 0.34);
      border-color: #dceaff;
    }
    .hotzone.gyro-zone {
      z-index: 0;
    }
    .hotzone.body-zone {
      z-index: 1;
    }
    .hotzone.card-zone {
      z-index: 2;
      border-color: rgba(255, 214, 112, 0.78);
      background: rgba(255, 196, 76, 0.16);
      color: #fff1bd;
    }
    .hotzone.card-result-zone {
      z-index: 3;
      border-color: rgba(255, 214, 112, 0.46);
      background: rgba(255, 196, 76, 0.08);
    }
    .hotzone.ellipse-zone {
      border-radius: 999px;
      clip-path: ellipse(50% 50% at 50% 50%);
    }
    .hotzone.giant-click-receiver {
      border-style: dashed;
      border-color: rgba(255, 214, 112, 0.52);
      background: rgba(255, 214, 112, 0.05);
      box-shadow: inset 0 0 0 1px rgba(255, 214, 112, 0.12);
      color: #fff1bd;
    }
    .hotzone::after {
      content: attr(data-label);
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      padding: 2px 6px;
      border-radius: 999px;
      background: rgba(11, 13, 18, 0.56);
      color: currentColor;
      font-size: 11px;
      line-height: 1.2;
      white-space: nowrap;
      pointer-events: none;
    }
    #hotzone-layer:not(.show-hotzones) .hotzone,
    #hotzone-layer:not(.show-hotzones) .hotzone:hover,
    #hotzone-layer:not(.show-hotzones) .hotzone.holding {
      border-color: transparent;
      background: transparent;
      box-shadow: none;
      color: transparent;
      cursor: default;
      opacity: 1;
    }
    #hotzone-layer:not(.show-hotzones) .hotzone::after {
      display: none;
    }

    #edge-hotzone {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: 16px;
      z-index: 19;
    }
    #drawer {

      top: 0; left: 0; bottom: 0;

      background: var(--panel);

      z-index: 20;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #drawer.open { transform: translateX(0); }
    #handle {
      position: fixed;
      top: 50%; left: 0;
      transform: translateY(-50%);

      border-radius: 0 4px 4px 0;
      background: rgba(255, 255, 255, 0.28);
      z-index: 18;
      opacity: 0;
      transition: opacity 0.4s;
      pointer-events: none;

      `https://cdn.jsdelivr.net/gh/clam314/bd2web-assets@${ASSET_COMMIT}/`,
      `https://fastly.jsdelivr.net/gh/clam314/bd2web-assets@${ASSET_COMMIT}/`,

      `https://raw.githubusercontent.com/clam314/bd2web-assets/${ASSET_COMMIT}/`,
    ];
    const customAssetBases = params.get("asset_base")
      ?.split(",")
      .map(v => v.trim())
      .filter(Boolean)
      .map(normalizeAssetBase);
    const ASSET_BASES = customAssetBases?.length ? customAssetBases : (useCdn ? CDN_ASSET_BASES : ["./upstream/"]);
    let assetBaseIndex = 0;
    let assetRetryTimer = null;
    let datingLoadGeneration = 0;
    let interactionState = {};

    function normalizeAssetBase(base) {
      return base.endsWith("/") ? base : base + "/";
    }

    function assetBase() {
      return ASSET_BASES[assetBaseIndex] || ASSET_BASES[0];
    }

    function assetUrl(path) {
      return assetBase() + path;
    }

    async function fetchAssetCheck(url, options = {}) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), 8000);
      try {
        const response = await fetch(url, {
          cache: "no-store",
          ...options,
          signal: controller.signal,
        });
        if (!response.ok) throw new Error(`${response.status} ${url}`);
        return response;
      } finally {
        clearTimeout(timer);
      }
    }

    async function preflightDatingAssets(entry, base) {
      const atlasUrl = base + entry.atlas;
      const atlas = await (await fetchAssetCheck(atlasUrl)).text();
      const textureNames = atlas
        .split(/\r?\n/)
        .map(line => line.trim())
        .filter(line => /\.png$/i.test(line));
      if (!textureNames.length) throw new Error(`atlas 没有贴图页：${atlasUrl}`);

      const directory = entry.atlas.slice(0, entry.atlas.lastIndexOf("/") + 1);
      const urls = [
        base + entry.skeleton,
        ...textureNames.map(name => base + directory + name),
      ];
      await Promise.all(urls.map(url => fetchAssetCheck(url, { method: "HEAD" })));
    }

    function retryAssetBase(reason, reload) {
      if (assetBaseIndex + 1 >= ASSET_BASES.length) return false;
      assetBaseIndex += 1;
      showError(`素材源加载失败，正在切换备用 CDN ${assetBaseIndex + 1}/${ASSET_BASES.length}：${reason}`);
      clearTimeout(assetRetryTimer);
      assetRetryTimer = setTimeout(reload, 120);
      return true;
    }

    class DatingAudioController {
      constructor() {
        this.context = null;
        this.voiceGain = null;
        this.sfxGain = null;
        this.manifestPromise = null;
        this.currentId = null;
        this.currentCharacter = null;
        this.prepareGeneration = 0;
        this.playGenerations = { voice: 0, sfx: 0 };
        this.bufferPromises = new Map();
        this.sources = new Set();
        this.unavailable = new Set();
        this.debug = new URLSearchParams(location.search).has("audioDebug");
      }

      ensureContext() {
        if (!this.context) {
          const AudioContextClass = window.AudioContext || window.webkitAudioContext;
          if (!AudioContextClass) return null;
          this.context = new AudioContextClass();
          this.voiceGain = this.context.createGain();
          this.voiceGain.gain.value = 0.9;
          this.voiceGain.connect(this.context.destination);
          this.sfxGain = this.context.createGain();
          this.sfxGain.gain.value = 0.82;
          this.sfxGain.connect(this.context.destination);
        }
        return this.context;
      }

      async unlock() {
        const context = this.ensureContext();
        if (context?.state === "suspended") {
          try { await context.resume(); } catch (e) { /* next user gesture can retry */ }
        }
      }

      loadManifest() {
        if (!this.manifestPromise) {
          this.manifestPromise = fetch("./data/dating_audio.json")
            .then(response => {
              if (!response.ok) throw new Error(`dating audio manifest ${response.status}`);
              return response.json();
            })
            .catch(() => ({ version: 1, characters: {} }));
        }
        return this.manifestPromise;
      }

      async prepare(datingId) {
        const generation = ++this.prepareGeneration;
        this.currentId = datingId;
        this.currentCharacter = null;
        this.stop();
        const manifest = await this.loadManifest();
        if (generation !== this.prepareGeneration || datingId !== this.currentId) return;
        const character = manifest.characters?.[datingId];
        if (!character) return;
        this.currentCharacter = character;

        const voiceNames = Object.keys(character.samples || {});
        const sfxNames = character.sfx?.disabled ? [] : Object.keys(character.sfx?.samples || {});
        if (!voiceNames.length && !sfxNames.length) return;
        try {
          const probeChannel = voiceNames.length ? "voice" : "sfx";
          const probeName = voiceNames[0] || sfxNames[0];
          await this.loadBuffer(character, probeName, probeChannel);
        } catch (e) {
          this.unavailable.add(datingId);
          return;
        }
        if (generation !== this.prepareGeneration || datingId !== this.currentId) return;
        const entries = [
          ...voiceNames.map(name => ({ channel: "voice", name })),
          ...sfxNames.map(name => ({ channel: "sfx", name })),
        ];
        this.preload(character, entries, generation);
      }

      async preload(character, entries, generation) {
        let next = 0;
        const worker = async () => {
          while (
            next < entries.length &&
            generation === this.prepareGeneration &&
            character === this.currentCharacter
          ) {
            const entry = entries[next++];
            try {
              await this.loadBuffer(character, entry.name, entry.channel);
            } catch (e) { /* lazy retry on use */ }
          }
        };
        await Promise.all(Array.from({ length: Math.min(6, entries.length) }, worker));
      }

      sampleUrl(character, sampleName, channel) {
        const collection = channel === "sfx" ? character.sfx : character;
        const sample = collection?.samples?.[sampleName];
        if (!sample) return null;
        return new URL(collection.audioBase + sample.file, document.baseURI).href;
      }

      loadBuffer(character, sampleName, channel = "voice") {
        const url = this.sampleUrl(character, sampleName, channel);
        if (!url) return Promise.reject(new Error(`unknown ${channel} sample ${sampleName}`));
        if (!this.bufferPromises.has(url)) {
          const promise = (async () => {
            const context = this.ensureContext();
            if (!context) throw new Error("Web Audio API unavailable");
            const response = await fetch(url);
            if (!response.ok) throw new Error(`${channel} sample ${response.status}`);
            return context.decodeAudioData(await response.arrayBuffer());
          })();
          this.bufferPromises.set(url, promise);
          promise.catch(() => this.bufferPromises.delete(url));
        }
        return this.bufferPromises.get(url);
      }

      stop(channel = null) {
        if (channel) {
          this.playGenerations[channel] = (this.playGenerations[channel] || 0) + 1;
        } else {
          this.playGenerations.voice += 1;
          this.playGenerations.sfx += 1;
        }
        [...this.sources].forEach(source => {
          if (channel && source._datingAudioChannel !== channel) return;
          try { source.stop(); } catch (e) { /* already stopped */ }
          this.sources.delete(source);
        });
        if (this.debug) document.documentElement.dataset.datingAudioSources = "0";
      }

      weightedChoice(choices) {
        const total = choices.reduce((sum, choice) => sum + Math.max(0, choice.weight), 0);
        if (!total) return choices[0] || null;
        let value = Math.random() * total;
        for (const choice of choices) {
          value -= Math.max(0, choice.weight);
          if (value <= 0) return choice;
        }
        return choices[choices.length - 1] || null;
      }

      chooseEventName(collection, eventNameOrNames) {
        if (Array.isArray(eventNameOrNames)) {
          const names = eventNameOrNames.filter(name => collection?.events?.[name]);
          if (!names.length) return null;
          return names[Math.floor(Math.random() * names.length)];
        }
        return collection?.events?.[eventNameOrNames] ? eventNameOrNames : null;
      }

      playAnimation(datingId, animationName) {
        const wallStartedAt = performance.now();
        if (this.debug) {
          document.documentElement.dataset.datingAudioPhase = `requested:${animationName}`;
        }
        void this.scheduleAnimation(datingId, animationName, wallStartedAt);
      }

      playInteractionVoice(datingId, pointKey, phase = "voice") {
        const wallStartedAt = performance.now();
        if (this.debug) {
          document.documentElement.dataset.datingAudioPhase = `point:${pointKey}:${phase}`;
        }
        void this.scheduleInteractionVoice(datingId, pointKey, phase, wallStartedAt);
      }

      async scheduleAnimation(datingId, animationName, wallStartedAt) {
        if (this.unavailable.has(datingId)) return;
        let character = this.currentId === datingId ? this.currentCharacter : null;
        if (!character) {
          const manifest = await this.loadManifest();
          character = manifest.characters?.[datingId];
        }
        if (
          !character ||
          datingId !== this.currentId
        ) return;

        const scheduledEvents = [
          {
            channel: "voice",
            collection: character,
            eventName: this.chooseEventName(character, character.actions?.[animationName]),
          },
          {
            channel: "sfx",
            collection: character.sfx,
            eventName: character.sfx?.disabled
              ? null
              : this.chooseEventName(character.sfx, character.sfx?.actions?.[animationName]),
          },
        ].map(item => ({
          ...item,
          event: item.eventName && item.collection?.events?.[item.eventName],
        })).filter(item => item.event?.triggers?.length);
        await this.scheduleEvents(character, scheduledEvents, wallStartedAt, `event`);
      }

      async scheduleInteractionVoice(datingId, pointKey, phase, wallStartedAt) {
        if (this.unavailable.has(datingId)) return;
        let character = this.currentId === datingId ? this.currentCharacter : null;
        if (!character) {
          const manifest = await this.loadManifest();
          character = manifest.characters?.[datingId];
        }
        if (!character || datingId !== this.currentId) return;
        const ref = character.interactionVoices?.[pointKey]?.[phase];
        let eventName = this.chooseEventName(character, ref);
        if (!eventName && pointKey) {
          // tool 兜底:心契母表(dating_interaction_tables)只按 (stage, id) 索引语音,与所选道具(tool)无关;
          // 已验证同一 (stage,id) 的不同 tool 变体在 interactionVoices 里语音完全一致(0 冲突),
          // 且每条 iv 语音都对应母表有语音的点(0 反例)。因此精确键查不到时,回退到同 (stage,id) 的任一变体是安全且忠实原表的。
          // 修复:①选道具后点击产生 tool21/22 等变体键、iv 只有 tool0(如 dating16/8/10/17);
          //       ②dating19 的 iv 整体键成 tool19/20、点击是 tool0,精确键零交集。
          const m = pointKey.match(/^(\d+)_(\d+)_/);
          if (m) {
            const prefix = `${m[1]}_${m[2]}_`;
            const voices = character.interactionVoices || {};
            for (const altKey of Object.keys(voices)) {
              if (altKey === pointKey || !altKey.startsWith(prefix)) continue;
              const alt = this.chooseEventName(character, voices[altKey]?.[phase]);
              if (alt) { eventName = alt; break; }
            }
          }
        }
        const scheduledEvents = [{
          channel: "voice",
          collection: character,
          eventName,
          event: eventName && character.events?.[eventName],
        }].filter(item => item.event?.triggers?.length);
        await this.scheduleEvents(character, scheduledEvents, wallStartedAt, `point:${pointKey}:${phase}`);
      }

      async scheduleEvents(character, scheduledEvents, wallStartedAt, debugLabel) {
        if (!scheduledEvents.length) return;
        if (this.debug) {
          document.documentElement.dataset.datingAudioPhase =
            `${debugLabel}:${scheduledEvents.map(item => `${item.channel}:${item.eventName}`).join(",")}`;
        }
        const context = this.ensureContext();
        if (!context) return;
        if (this.debug) {
          document.documentElement.dataset.datingAudioContext = context.state;
        }
        if (context.state === "suspended") {
          void context.resume().catch(() => { /* next user gesture can retry */ });
        }
        if (this.debug) {
          document.documentElement.dataset.datingAudioContext = context.state;
          document.documentElement.dataset.datingAudioPhase =
            `scheduling:${debugLabel}:${scheduledEvents.map(item => `${item.channel}:${item.eventName}`).join(",")}`;
        }

        const elapsed = Math.max(0, (performance.now() - wallStartedAt) / 1000);
        const contextStartedAt = context.currentTime - elapsed;
        scheduledEvents.forEach(item => {
          this.stop(item.channel);
          const generation = this.playGenerations[item.channel];
          item.event.triggers.forEach(trigger => {
            const choice = this.weightedChoice(trigger.choices || []);
            if (choice) {
              void this.scheduleTrigger(
                character,
                choice.sample,
                trigger,
                contextStartedAt,
                generation,
                item.channel
              );
            }
          });
        });
      }

      async scheduleTrigger(
        character,
        sampleName,
        trigger,
        contextStartedAt,
        generation,
        channel
      ) {
        let buffer;
        try {
          buffer = await this.loadBuffer(character, sampleName, channel);
        } catch (e) {
          return;
        }
        if (generation !== this.playGenerations[channel] || character !== this.currentCharacter) return;

        const context = this.context;
        const target = contextStartedAt + trigger.at;
        const lateBy = Math.max(0, context.currentTime - target);
        const playableWindow = Math.min(buffer.duration, trigger.window || buffer.duration);
        if (lateBy >= playableWindow) return;

        const source = context.createBufferSource();
        source.buffer = buffer;
        source._datingAudioChannel = channel;
        source.connect(channel === "sfx" ? this.sfxGain : this.voiceGain);
        source.onended = () => {
          this.sources.delete(source);
          if (this.debug) {
            document.documentElement.dataset.datingAudioSources = String(this.sources.size);
          }
        };
        this.sources.add(source);
        const startAt = Math.max(context.currentTime, target);
        if (this.debug) {
          document.documentElement.dataset.datingAudioSample = sampleName;
          document.documentElement.dataset.datingAudioChannel = channel;
          document.documentElement.dataset.datingAudioAt = String(trigger.at);
          document.documentElement.dataset.datingAudioSources = String(this.sources.size);
          console.debug(
            `[dating-audio:${channel}] ${sampleName} at=${trigger.at.toFixed(3)}s ` +
            `late=${lateBy.toFixed(3)}s`
          );
        }
        source.start(startAt, lateBy);
        const remainingWindow = playableWindow - lateBy;
        if (remainingWindow < buffer.duration - lateBy) {
          source.stop(startAt + remainingWindow);
        }
      }
    }

    function makeViewport(entry) {
      const base = PREFAB_VIEWPORTS[entry.id] || DEFAULT_VIEWPORT;
      if (base.x !== undefined) return base;
      if (viewMode === "fit") return GAME_SCREEN_VIEWPORT;
      const modeScale = viewMode === "fill" ? (base.scale || 0.5) * 1.45 : 1;
      const padding = viewMode === "fill" ? 1.04 : 1.08;
      const width = Math.round(base.width * modeScale * padding);
      const height = Math.round(base.height * modeScale * padding);
      return {
        x: Math.round(base.cx - width / 2),
        y: Math.round(base.cy - height / 2),
        width,
        height,
      };
    }

      const selectedAssetBase = assetBase();
      try {

        if (loadGeneration !== datingLoadGeneration) return;
        const reason = error?.message || String(error);

        showError("加载失败：" + reason);

      if (loadGeneration !== datingLoadGeneration) return;

      const config = {
        skelUrl: selectedAssetBase + entry.skeleton,
        atlasUrl: selectedAssetBase + entry.atlas,
        showControls: false,
        showLoading: false,
        alpha: true,
        premultipliedAlpha: false,
        viewport: VIEWPORT_OVERRIDES[entry.id] || makeViewport(entry),
        frame: (p) => {
          if (!hotzoneProjectionPending && !hotzoneFollowTracking) return;
          if (!p.viewport?.width || !p.viewport?.height) return;
          const rect = p.canvas?.getBoundingClientRect();
          if (!rect?.width || !rect?.height) return;
          if (hotzoneProjectionPending) {
            hotzoneProjectionPending = false;
            renderHotzones(currentPrefabActions());

            refreshHotzonePositions();
          }
        },
        success: (p) => {
          if (loadGeneration !== datingLoadGeneration || p !== player) {
            try { p.dispose(); } catch (e) { /* stale partial player */ }
            return;
          }
          try {
            const atlas = Object.entries(p.assetManager.assets)
              .find(([k]) => k.endsWith(".atlas"))[1];
            p.config.premultipliedAlpha = atlas.pages.some(pg => pg.pma);
          } catch (e) { /* keep straight alpha */ }
          buildStageModel(p);
          attachDragFollowHook(p);
          const requestedStage = Number(new URLSearchParams(location.search).get("stage"));
          if (Number.isInteger(requestedStage) && stageModel.stages.has(requestedStage)) {
            currentStage = requestedStage;
          }
          renderStageControls();
          attachPlaybackListener(p);
        },
        error: (_p, reason) => {
          if (loadGeneration !== datingLoadGeneration) return;
          disposePlayerSafely();
          stage.innerHTML = "";
          if (retryAssetBase(reason, () => loadDating(entry, btn))) return;
          showError("加载失败：" + reason);
        },
      };
      player = new spine.SpinePlayer("stage", config);
      if (datingAudio.debug) window.__player = player;
    }

    function buildStageModel(p) {
      const names = p.skeleton.data.animations.map(a => a.name);
      const faces = names.filter(n => n.startsWith("_"));
      const bodies = names.filter(n => !n.startsWith("_"));
      const defaultMotions = currentEntry ? DEFAULT_STAGE_MOTIONS[currentEntry.id] : null;
      const stages = new Map();
      const ensureStage = (stageNo) => {
        if (!stages.has(stageNo)) {
          stages.set(stageNo, { idles: [], points: [], motions: [], mixes: [] });
        }
        return stages.get(stageNo);
      };

      bodies.forEach(name => {
        let m = name.match(/^idle(\d+)$/);
        if (m) { ensureStage(Number(m[1])).idles.push(name); return; }
        m = name.match(/^point(\d+)_/);
        if (m) { ensureStage(Number(m[1])).points.push(name); return; }
        m = name.match(/^motion(\d+)_/);
        if (m) { ensureStage(Number(m[1])).motions.push(name); return; }
        m = name.match(/^mix(\d+)_/);
        if (m) { ensureStage(Number(m[1])).mixes.push(name); return; }
        if (name === "loop" && !defaultMotions) ensureStage(1).idles.push(name);
      });
      if (defaultMotions) {
        Object.entries(defaultMotions).forEach(([stageNo, motion]) => {
          const stage = ensureStage(Number(stageNo));
          if (bodies.includes(motion)) stage.idles.unshift(motion);
        });
      }
      const meta = currentEntry ? INTERACTION_POINTS[currentEntry.id] : null;
      if (meta) Object.keys(meta).forEach(stageNo => ensureStage(Number(stageNo)));

      if (!stages.size) {
        const base = bodies.find(n => /idle|loop/i.test(n)) || bodies[0];
        stages.set(1, { idles: base ? [base] : [], points: bodies.filter(n => n !== base), motions: [], mixes: [] });
      }

      const stageIds = [...stages.keys()].sort((a, b) => a - b);
      stageIds.forEach(id => {
        const s = stages.get(id);
        s.idles = uniq(s.idles).sort(stageNameSort);
        s.points = uniq(s.points).sort(pointNameSort);
        s.motions = uniq(s.motions).sort(motionNameSort);
        s.mixes = uniq(s.mixes).sort(motionNameSort);
      });

      stageModel = {
        stages,
        stageIds,
        faces,
        fallbackIdle: bodies.find(n => /idle|loop/i.test(n)) || bodies[0],
        pointMeta: meta || {},
      };
      currentStage = stageIds[0] || 1;
    }

    function renderStageControls() {
      if (!stageModel) return;

      stageRow.className = "stage-row";
      stageModel.stageIds.forEach(id => {
        const b = document.createElement("button");
        b.className = "item" + (id === currentStage ? " active" : "");
        const label = STAGE_LABELS[currentEntry?.id]?.[id];
        b.textContent = label ? `阶段${id} · ${label}` : `阶段${id}`;
        b.onclick = () => enterStage(id);
        stageRow.appendChild(b);
      });
      animList.appendChild(stageRow);

      renderViewControls();
      renderToolControls(tools);

      const idleName = pickIdle(stage);
      const idleBtn = document.createElement("button");
      idleBtn.className = "item body-anim active";
      idleBtn.textContent = idleName ? `待机：${idleName}` : "待机";
      idleBtn.title = idleName || "";
      idleBtn.onclick = () => playIdle();
      animList.appendChild(idleBtn);

      const prefabActions = currentPrefabActions();
      const prefabHandlesAdvance = prefabActions.some(item => item.action.nextStage);
      if (stage.motions.length && !prefabHandlesAdvance) {
        const next = nextStageId();
        const b = document.createElement("button");
        b.className = "item advance-btn";
        b.textContent = next ? `推进到阶段${next}` : "播放阶段演出";
        b.title = stage.motions.join(" -> ");
        b.onclick = () => advanceStage();
        animList.appendChild(b);
      }

      const interactLabel = document.createElement("div");
      interactLabel.className = "sub-label";
      interactLabel.textContent = "互动";
      animList.appendChild(interactLabel);

      const points = stage.points.filter(name => !name.includes("_hidden") && isPointVisibleForTool(name));
      if (!points.length && !prefabActions.length) {
        renderInteractionSummary(currentStage);
      }
      points.forEach((name, idx) => {
        const b = document.createElement("button");
        b.className = "item body-anim";
        b.textContent = pointLabel(name, idx);
        b.title = name;
        b.onclick = () => playPoint(name, b);
        animList.appendChild(b);
      });
      prefabActions.forEach(({ key, action }, idx) => {
        const b = document.createElement("button");
        b.className = "item body-anim";
        b.textContent = prefabActionLabel(action, idx, key);
        b.title = prefabActionTitle(action, key);
        b.onclick = () => action.cardGame === "deal" ? playCardDeal() : playPrefabAction(action, b, key);
        animList.appendChild(b);
      });

      renderFaces(stageModel.faces);
      playIdle();
    }

    function renderInteractionSummary(stageNo) {
      const meta = stageModel.pointMeta[String(stageNo)] || stageModel.pointMeta[stageNo];
      if (!meta) {
        const empty = document.createElement("div");
        empty.className = "empty-note";
        empty.textContent = "这个阶段没有可直接触发的 point 动画，先使用阶段演出或待机查看。";
        animList.appendChild(empty);
        return;
      }
      [
        ["touch", "触摸"],
        ["drag", "拖拽"],
        ["gyro", "晃动"],
      ].forEach(([kind, label]) => {
        if (!meta[kind]) return;
        const b = document.createElement("button");
        b.className = "item";
        b.textContent = `${label}热区 · ${meta[kind]} 个`;
        b.onclick = () => showError(`已识别阶段${stageNo}的 ${meta[kind]} 个${label}热区；下一步可接入真实坐标和对应语音。`);
        animList.appendChild(b);
      });
    }

    function renderToolControls(tools) {
      if (!tools.length) return;

      const label = document.createElement("div");
      label.className = "sub-label";
      label.textContent = "道具";
      animList.appendChild(label);

      const row = document.createElement("div");
      row.className = "tool-row";

      const all = document.createElement("button");
      all.className = "item" + (selectedToolId === null ? " active" : "");
      all.textContent = "全部";
      all.onclick = () => selectTool(null);
      row.appendChild(all);

      tools.forEach(toolId => {
        const b = document.createElement("button");
        b.className = "item" + (selectedToolId === toolId ? " active" : "");
        b.textContent = toolName(toolId);
        b.title = `ToolId ${toolId}`;
        b.onclick = () => selectTool(toolId);
        row.appendChild(b);
      });
      animList.appendChild(row);
    }

    function renderViewControls() {
      const label = document.createElement("div");
      label.className = "sub-label";
      label.textContent = "画面";
      animList.appendChild(label);

      const row = document.createElement("div");
      row.className = "view-row";
      [
        ["fit", "游戏"],
        ["full", "完整"],
        ["fill", "填充"],
      ].forEach(([mode, text]) => {
        const b = document.createElement("button");
        b.className = "item" + (viewMode === mode ? " active" : "");
        b.textContent = text;
        b.onclick = () => setViewMode(mode);
        row.appendChild(b);
      });
      animList.appendChild(row);
    }

    function setViewMode(mode) {
      if (viewMode === mode) return;
      viewMode = mode;
      localStorage.setItem("datingViewMode", mode);
      if (currentEntry && activeBtn) loadDating(currentEntry, activeBtn);
    }

    function selectTool(toolId) {
      cancelHoldPoseFreeze();
      selectedToolId = toolId;
      if (toolId === 14) enableDeviceOrientation();
      applyStageSkin(currentStage);
      renderStageControls();
    }

    function renderFaces(faces) {
      if (!faces.length) return;
      const label = document.createElement("div");
      label.className = "sub-label";
      label.textContent = "表情";
      animList.appendChild(label);
      faces.forEach(name => {
        const b = document.createElement("button");
        b.className = "item face-anim";
        b.textContent = name;
        b.onclick = () => {
          if (!player) return;
          try {
            cancelHoldPoseFreeze();
            if (b.classList.contains("active")) {
              player.animationState.setEmptyAnimation(1, 0.2);
              b.classList.remove("active");
            } else {
              animList.querySelectorAll(".face-anim").forEach(x => x.classList.remove("active"));
              player.animationState.setAnimation(1, name, true);
              b.classList.add("active");
            }
            player.play();
          } catch (e) { showError("切换表情失败：" + e.message); }
        };
        animList.appendChild(b);
      });
    }

    function enterStage(stageNo) {
      if (!stageModel || !stageModel.stages.has(stageNo)) return;
      resetCardGame(false);
      cancelHoldPoseFreeze();
      cancelLongPress(false);
      cancelPrefabDrag();
      cancelGyroDrag();
      if (STATEFUL_INTERACTION_IDS.has(currentEntry?.id) && stageNo === 1) {
        interactionState = {};
      }
      if (stageNo !== currentStage) clearIndexedTouchMixProgress();
      hotzonesSuppressed = false;
      currentStage = stageNo;
      selectedToolId = defaultStageToolId(stageNo, getStageTools(stageModel.stages.get(stageNo)));
      teresseToolMode = null;
      clearTimeout(advanceTimer);
      advanceTimer = null;
      renderStageControls();
    }

    function advanceStage() {
      if (!player || !stageModel) return;
      cancelHoldPoseFreeze();
      const stage = stageModel.stages.get(currentStage);
      const seq = stage.motions.length ? stage.motions : stage.mixes;
      const next = nextStageId();
      if (!seq.length) {
        if (next) enterStage(next);
        return;
      }
      try {
        restoringIdle = false;
        advanceTargetStage = next || null;
        advanceLastMotion = seq[seq.length - 1] || null;
        if (OVERLAY_TRACK_INTERACTION_IDS.has(currentEntry?.id)) {
          advanceLastMotion = null;
          playOverlaySequence(seq.filter(animationExists), next || null);
        } else {
          player.animationState.data.defaultMix = 0.25;
          player.setAnimation(seq[0], false);
          seq.slice(1).forEach(name => player.animationState.addAnimation(0, name, false, 0));
        }
        player.play();
        animList.querySelectorAll(".body-anim").forEach(x => x.classList.remove("active"));
        clearTimeout(advanceTimer);
        if (next) {
          const duration = seq.reduce((sum, name) => sum + animationDuration(name), 0);
          const delay = Math.min(7000, Math.max(1600, duration * 1000 + 300));
          advanceTimer = setTimeout(() => {
            if (advanceTargetStage === next) enterStage(next);
          }, delay);
        }
      } catch (e) { showError("播放阶段演出失败：" + e.message); }
    }

    function playPoint(name, btn) {
      if (!player) return;
      try {
        cancelHoldPoseFreeze();
        const pointKey = prefabPointKeyFromName(name);
        restoringIdle = false;
        advanceTargetStage = null;
        advanceLastMotion = null;
        activeInteractionVoiceKey = pointKey;
        activeInteractionMotionNames = new Set();
        clearTimeout(advanceTimer);
        advanceTimer = null;
        player.animationState.data.defaultMix = 0.2;
        const action = prefabPointAction(name);
        const sequence = action ? prefabActionSequence(action) : [];
        if (pointKey && currentEntry) {
          datingAudio.playInteractionVoice(currentEntry.id, pointKey, "voice");
        }
        if (sequence.length) {
          const targetStage = resolveActionNextStage(action);
          advanceTargetStage = targetStage;
          advanceLastMotion = sequence[sequence.length - 1] || null;
          activeInteractionMotionNames = new Set(action?.motions || []);
          setPrimaryAnimation(sequence[0], false);
          sequence.slice(1).forEach(anim => addPrimaryAnimation(anim, false, 0));
          if (advanceTargetStage) {
            const duration = sequence.reduce((sum, anim) => sum + animationDuration(anim), 0);
            const delay = Math.min(9000, Math.max(1200, duration * 1000 + 300));
            advanceTimer = setTimeout(() => {
              if (advanceTargetStage === targetStage) enterStage(targetStage);
            }, delay);
          }
        } else {
          setPrimaryAnimation(name, false);
        }
        player.play();
        animList.querySelectorAll(".body-anim").forEach(x => x.classList.remove("active"));
        btn.classList.add("active");
      } catch (e) { showError("播放互动失败：" + e.message); }
    }

    function playPrefabAction(action, btn, pointKey = null) {
      if (!player || !action) return;
      try {
        if (!canPlayAction(action)) return;
        clearError();
        const playbackAction = prepareActionPlayback(action, pointKey);
        if (!playbackAction) return;
        cancelTouchStop();
        cancelHoldPoseFreeze();
        const targetStage = resolveActionNextStage(playbackAction);
        const holdPose = shouldHoldPrefabActionPose(playbackAction, pointKey);
        restoringIdle = false;
        advanceTargetStage = targetStage;
        advanceLastMotion = null;
        activeInteractionVoiceKey = pointKey;
        activeInteractionMotionNames = new Set(playbackAction.motions || []);
        clearTimeout(advanceTimer);
        advanceTimer = null;
        player.animationState.data.defaultMix = 0.2;
        const sequence = prefabActionSequence(playbackAction);
        if (!sequence.length) {
          showError("这个 prefab 互动没有可播放的 Spine 动画。");
          return;
        }
        if (pointKey && currentEntry) {
          datingAudio.playInteractionVoice(currentEntry.id, pointKey, "voice");
        }
        if (playbackAction.selectMode) {
          teresseToolMode = playbackAction.selectMode;
          renderHotzones(currentPrefabActions());
        }
        advanceLastMotion = sequence[sequence.length - 1];
        if (holdPose) {
          advanceLastMotion = null;
          const holdEntries = [];
          const holdEntry = player.animationState.setAnimation(1, sequence[0], false);
          if (holdEntry) holdEntry.trackEnd = Number.MAX_VALUE;
          if (holdEntry) holdEntries.push(holdEntry);
          sequence.slice(1).forEach(anim => {
            const entry = player.animationState.addAnimation(1, anim, false, 0);
            if (entry) entry.trackEnd = Number.MAX_VALUE;
            if (entry) holdEntries.push(entry);
          });
          if (currentEntry) datingAudio.playAnimation(currentEntry.id, sequence[0]);
          scheduleHoldPoseFreeze(pointKey, holdEntries, sequence);
        } else if (shouldUseTouchOverlayTrack(playbackAction, sequence)) {
          advanceLastMotion = null;
          playOverlaySequence(sequence, targetStage);
        } else {
          setPrimaryAnimation(sequence[0], false);
          sequence.slice(1).forEach(anim => addPrimaryAnimation(anim, false, 0));
        }
        player.play();
        applyActionState(playbackAction);
        if (playbackAction.requiresMode && !playbackAction.stayMode) {
          teresseToolMode = null;
          renderHotzones(currentPrefabActions());
        }
        animList.querySelectorAll(".body-anim").forEach(x => x.classList.remove("active"));
        if (btn) btn.classList.add("active");
        if (playbackAction._touchProgressText) {
          showStatus(playbackAction._touchProgressText, playbackAction._touchCompleted ? 1400 : 900);
        }
        if (advanceTargetStage) {
          const duration = sequence.reduce((sum, anim) => sum + animationDuration(anim), 0);
          const delay = Math.min(9000, Math.max(1200, duration * 1000 + 300));
          advanceTimer = setTimeout(() => {
            if (advanceTargetStage === targetStage) enterStage(targetStage);
          }, delay);
        }
        scheduleTouchStop(playbackAction, pointKey);
      } catch (e) { showError("播放 prefab 互动失败：" + e.message); }
    }

    // overlay 轨(track 1)上的互动动画不经过全局 start 监听(只处理 track 0 的 SFX/动作语音)，
    // 用 TrackEntry 自带 listener 补齐；entry 回池时 listener 会被 runtime 清掉，不会泄漏。
    const overlayAudioListener = {
      start: (entry) => {
        const name = entry?.animation?.name;
        if (!name || !currentEntry) return;
        if (activeInteractionVoiceKey && activeInteractionMotionNames.has(name)) {
          datingAudio.playInteractionVoice(currentEntry.id, activeInteractionVoiceKey, "motion");
        }
        datingAudio.playAnimation(currentEntry.id, name);
      },
    };

    // 末条动画播完立即推进阶段(advanceTimer 只兜底)；setTimeout 跳出 spine 事件回调,
    // 因为 enterStage -> playIdle 会 clearTrack(1) 清掉正在派发事件的 entry。
    function overlayAdvanceListener(targetStage) {
      return {
        start: overlayAudioListener.start,
        complete: () => {
          if (!targetStage || advanceTargetStage !== targetStage) return;
          setTimeout(() => {
            if (advanceTargetStage === targetStage) enterStage(targetStage);
          }, 0);
        },
      };
    }

    // 互动序列统一叠播在 track 1(idle 常驻 track 0)。时长≈0 的单帧姿势(连点链中间步)
    // 保持末帧不清,等下一步/链收尾/重置;有阶段推进的也保持末帧,交给 enterStage 清 track 1。
    function playOverlaySequence(sequence, targetStage) {
      player.animationState.data.defaultMix = 0.08;
      const entries = [player.animationState.setAnimation(1, sequence[0], false)];
      sequence.slice(1).forEach(anim => entries.push(player.animationState.addAnimation(1, anim, false, 0)));
      entries.forEach(entry => { if (entry) entry.listener = overlayAudioListener; });
      const last = entries[entries.length - 1];
      if (targetStage) {
        if (last) last.listener = overlayAdvanceListener(targetStage);
        suppressHotzonesForTransition();
        return;
      }
      const duration = sequence.reduce((sum, anim) => sum + animationDuration(anim), 0);
      if (duration > 0.05) {
        player.animationState.addEmptyAnimation(1, 0.12, Math.max(0, duration));
      }
    }

    // 阶段推进演出期间隐藏热区：过渡 motion 会把跟随骨骼甩满屏,旧阶段热区跟着乱飞。
    let hotzonesSuppressed = false;
    function suppressHotzonesForTransition() {
      hotzonesSuppressed = true;
      hotzoneLayer.querySelectorAll(".hotzone").forEach(el => { el.hidden = true; });
    }

    function setPrimaryAnimation(name, loop) {
      return player.animationState.setAnimation(0, name, loop);
    }

    function addPrimaryAnimation(name, loop, delay) {
      return player.animationState.addAnimation(0, name, loop, delay);
    }

    function prefabActionSequence(action) {
      const destinationIndex = Number.isInteger(action.destinationIndex) ? action.destinationIndex : 0;
      const motions = action.destinationIndexed
        ? (action.motions || []).slice(destinationIndex, destinationIndex + 1)
        : (action.motions || []);
      const completionStop = action._touchCompleted && action.stopMix && action._playCompletionStop ? [action.stopMix] : [];
      return [...(action.mix || []), ...completionStop, ...motions].filter(animationExists);
    }

    function prepareActionPlayback(action, pointKey) {
      if (action.kind !== "touch") return action;
      if (action.randomMix && !action.clickMax) {
        const mix = randomMixChoice(action.mix || []);
        return mix ? { ...action, mix: [mix] } : action;
      }
      if (!action.clickMax && shouldUseIndexedTouchMix(action)) {
        return prepareIndexedTouchMix(action, pointKey);
      }
      if (!action.clickMax) return action;
      const progressKey = action.progressKey || `${currentEntry?.id || "entry"}:${pointKey || action.label || "action"}:progress`;
      const now = performance.now();
      const resetMs = Math.max(100, (Number(action.clickReset) || 1) * 1000);
      const previousState = interactionState[progressKey];
      const previousCount = previousState && typeof previousState === "object" && now - previousState.at <= resetMs
        ? previousState.count || 0
        : 0;
      if (!action.gauge && previousCount >= action.clickMax) {
        showStatus("连点已达到上限", 700);
        return null;
      }
      const next = Math.min(previousCount + 1, action.clickMax);
      const complete = next >= action.clickMax;
      const mix = action.randomMix
        ? randomMixChoice(action.mix || [])
        : (action.mix || [])[Math.min(next - 1, Math.max(0, (action.mix || []).length - 1))];
      interactionState = { ...interactionState, [progressKey]: { count: next, at: now } };
      return {
        ...action,
        mix: mix ? [mix] : [],
        motions: complete ? action.motions : [],
        nextStage: complete ? action.nextStage : null,
        setFlag: complete ? action.setFlag : null,
        _playCompletionStop: complete && Boolean(action.stopMix && (action.nextStage || action.setFlag || (action.motions || []).length)),
        _touchProgressKey: progressKey,
        _touchCompleted: complete,
        _touchResetMs: resetMs,
        _touchProgressText: complete
          ? `连点完成 ${next}/${action.clickMax}`
          : `连点 ${next}/${action.clickMax}`,
      };
    }

    function shouldUseIndexedTouchMix(action) {
      const mix = action.mix || [];
      if (action.kind !== "touch" || action.clickMax || action.randomMix || action.gauge || action.stopMix) return false;
      if (action.nextStage || action.setFlag || (action.motions || []).length) return false;
      if (mix.length < 2) return false;
      return mix.some(name => /_end$/.test(name)) || new Set(mix).size < mix.length;
    }

    function prepareIndexedTouchMix(action, pointKey) {
      const progressKey = action.progressKey || `${currentEntry?.id || "entry"}:${pointKey || action.label || "action"}:indexedMix`;
      const max = Math.max(1, (action.mix || []).length);
      const now = performance.now();
      const resetMs = Math.max(100, (Number(action.clickReset) || 1) * 1000);
      const previousState = interactionState[progressKey];
      const previousComplete = previousState && typeof previousState === "object" && previousState.complete;
      const previousFresh = previousState && typeof previousState === "object" && now - (previousState.at || 0) <= resetMs;
      const previousCount = previousState && typeof previousState === "object" && (!previousComplete || previousFresh)
        ? previousState.count || 0
        : 0;
      if (previousCount >= max) {
        showStatus(`连点已完成 ${max}/${max}`, 700);
        return null;
      }
      const next = Math.min(previousCount + 1, max);
      const mixIndex = Math.min(next - 1, Math.max(0, (action.mix || []).length - 1));
      const mix = (action.mix || [])[mixIndex];
      const complete = next >= max;
      interactionState = { ...interactionState, [progressKey]: { count: next, complete, at: now } };
      return {
        ...action,
        mix: mix ? [mix] : [],
        motions: [],
        nextStage: null,
        setFlag: null,
        _mixOverlayOnly: true,
        _touchCompleted: complete,
        _touchProgressKey: progressKey,
        _touchResetMs: resetMs,
        _touchProgressText: complete ? `连点完成 ${next}/${max}` : `连点 ${next}/${max}`,
      };
    }

    function clearIndexedTouchMixProgress() {
      const keys = Object.keys(interactionState).filter(key => key.endsWith(":indexedMix"));
      if (!keys.length) return;
      interactionState = { ...interactionState };
      keys.forEach(key => delete interactionState[key]);
    }

    function randomMixChoice(mixes) {
      const available = (mixes || []).filter(animationExists);
      return available.length ? available[Math.floor(Math.random() * available.length)] : null;
    }

    function scheduleTouchStop(action, pointKey = null) {
      const stopMix = action?.stopMix;
      const hasProgress = Boolean(action?._touchProgressKey && !action.gauge && !action._touchCompleted);
      const canPlayStop = Boolean(stopMix && animationExists(stopMix) && !action._touchCompleted);
      if (!canPlayStop && !hasProgress) return;
      const token = ++touchStopToken;
      const resetMs = action._touchResetMs || Math.max(100, (Number(action.clickReset) || 1) * 1000);
      touchStopTimer = setTimeout(() => {
        if (token !== touchStopToken || !player) return;
        touchStopTimer = null;
        if (hasProgress) {
          interactionState = { ...interactionState };
          delete interactionState[action._touchProgressKey];
          showStatus("连点已重置", 900);
          // overlay 角色的连点链姿势保持在 track 1 上，链超时重置时淡出回待机。
          if (!canPlayStop && OVERLAY_TRACK_INTERACTION_IDS.has(currentEntry?.id)) clearDragOverlay();
        }
        if (!canPlayStop) return;
        try {
          restoringIdle = false;
          advanceTargetStage = null;
          advanceLastMotion = stopMix;
          activeInteractionVoiceKey = pointKey;
          activeInteractionMotionNames = new Set();
          if (OVERLAY_TRACK_INTERACTION_IDS.has(currentEntry?.id)) {
            advanceLastMotion = null;
            playOverlaySequence([stopMix], null);
          } else {
            player.animationState.data.defaultMix = 0.12;
            player.setAnimation(stopMix, false);
          }
          player.play();
        } catch (e) { showError("播放触摸收尾失败：" + e.message); }
      }, resetMs);
    }

    function cancelTouchStop() {
      touchStopToken++;
      clearTimeout(touchStopTimer);
      touchStopTimer = null;
    }

    function scheduleHoldPoseFreeze(pointKey, entries = [], sequence = []) {
      const token = ++holdPoseToken;
      clearTimeout(holdPoseTimer);
      const targets = holdPoseTargets(pointKey);
      const startedAt = performance.now();
      const maxWait = Math.max(1100, sequence.reduce((sum, anim) => sum + animationDuration(anim), 0) * 1000 + 120);
      holdPoseFreezeState = { token, targets: new Set(targets), entries };
      holdPoseTrackActive = true;
      const tryFreeze = () => {
        if (token !== holdPoseToken || !player) return;
        refreshHotzonePositions();
        const ready = targets.some(key => {
          const el = hotzoneLayer.querySelector(`.hotzone[data-key="${key}"]`);
          return el && !el.hidden;
        });
        if (ready) {
          freezeHoldPoseEntries(holdPoseFreezeState);
          holdPoseTimer = null;
          refreshHotzonePositions();
          return;
        }
        if (performance.now() - startedAt > maxWait) {
          holdPoseTimer = null;
          clearHoldPoseTrack();
          refreshHotzonePositions();
          return;
        }
        holdPoseTimer = setTimeout(tryFreeze, 50);
      };
      holdPoseTimer = setTimeout(tryFreeze, 150);
    }

    function cancelHoldPoseFreeze() {
      holdPoseToken++;
      clearTimeout(holdPoseTimer);
      holdPoseTimer = null;
      holdPoseFreezeState = null;
      clearHoldPoseTrack();
    }

    function clearHoldPoseTrack() {
      if (!holdPoseTrackActive) return;
      if (player?.animationState) {
        try { player.animationState.clearTrack(1); } catch (e) { /* track may already be gone */ }
      }
      holdPoseTrackActive = false;
    }

    function holdPoseTargets(pointKey) {
      return HOLD_POSE_TARGETS[currentEntry?.id]?.[pointKey] || [];
    }

    function maybeFreezeHoldPoseAtVisibleTarget(pointKey) {
      const state = holdPoseFreezeState;
      if (!state || state.token !== holdPoseToken || !state.targets.has(pointKey)) return;
      freezeHoldPoseEntries(state);
    }

    function freezeHoldPoseEntries(state) {
      if (!state) return;
      state.entries.forEach(entry => {
        if (entry) entry.timeScale = 0;
      });
      const current = player?.animationState?.getCurrent?.(1);
      if (current) current.timeScale = 0;
      holdPoseTrackActive = true;
      holdPoseFreezeState = null;
      clearTimeout(holdPoseTimer);
      holdPoseTimer = null;
    }

    function canPlayAction(action) {
      const missing = (action.requires || []).filter(flag => !interactionState[flag]);
      if (missing.length) {
        showError(action.blockedMessage || "还没有满足这个互动的前置步骤。");
        return false;
      }
      if (action.requiresMode && teresseToolMode !== action.requiresMode) {
        showError(action.blockedMessage || "先选择对应道具，再点目标位置。");
        return false;
      }
      return true;
    }

    function applyActionState(action) {
      if (!action.setFlag) {
        renderHotzones(currentPrefabActions());
        return;
      }
      interactionState = { ...interactionState, [action.setFlag]: true };
      renderHotzones(currentPrefabActions());
    }

    function playIdle() {
      if (!player || !stageModel) return;
      const idle = pickIdle(stageModel.stages.get(currentStage));
      if (!idle) return;
      try {
        resetCardGame(true);
        cancelTouchStop();
        cancelHoldPoseFreeze();
        restoringIdle = true;
        dragHolding = false;
        stopDragFollow();
        if (OVERLAY_TRACK_INTERACTION_IDS.has(currentEntry?.id)) {
          try { player.animationState.clearTrack(1); } catch (e) { clearDragOverlay(); }
        }
        if (hotzonesSuppressed) {
          hotzonesSuppressed = false;
          renderHotzones(currentPrefabActions());
        }
        advanceTargetStage = null;
        advanceLastMotion = null;
        activeInteractionVoiceKey = null;
        activeInteractionMotionNames = new Set();
        clearTimeout(advanceTimer);
        advanceTimer = null;
        player.animationState.data.defaultMix = 0.25;
        applyStageSkin(currentStage);
        try { player.skeleton?.setSlotsToSetupPose?.(); } catch (e) { /* best-effort idle cleanup */ }
        resetFollowPointBones();
        player.setAnimation(idle, true);
        // setSlotsToSetupPose 之后立刻同步 apply 一次:playIdle 可能在本帧 apply 之后被调用
        // (complete/queue 回调),不补 apply 的话 setup pose 会被渲染一帧(多姿势组角色=重叠闪烁)。
        try { player.animationState.apply(player.skeleton); } catch (e) { /* best-effort */ }
        player.play();
        animList.querySelectorAll(".body-anim").forEach(x => x.classList.remove("active"));
        const idleBtn = [...animList.querySelectorAll(".body-anim")].find(b => b.title === idle);
        if (idleBtn) idleBtn.classList.add("active");
        scheduleHotzoneRender();
      } catch (e) { showError("播放待机失败：" + e.message); }
    }

    // clearTrack(1) 掐掉进行中的互动 mix 时(换阶段/待机按钮/链超时)，被动画搬到停车位的
    // point* 跟随骨骼不再被任何轨道 key 回来，会永久冻在错误位置(dating12 的 23s 隐藏演出
    // mix3_32_1 开场就把其它触摸点全部停车)。回待机时统一把 point* 骨骼复位到 setup。
    function resetFollowPointBones() {
      if (!BONE_FOLLOW_HOTZONE_IDS.has(currentEntry?.id)) return;
      (player?.skeleton?.bones || []).forEach(bone => {
        if (bone.data.name.startsWith("point")) bone.setToSetupPose();
      });
    }

    function scheduleHotzoneRender() {
      // SpinePlayer applies its effective viewport/camera during drawFrame.
      // Let the player's frame callback project once those values are valid.
      hotzoneProjectionPending = true;
    }

    function applyStageSkin(stageNo) {
      const stageSkins = currentEntry && STAGE_TOOL_SKINS[currentEntry.id]?.[stageNo];
      const skinName = stageSkins && (stageSkins[selectedToolId] || stageSkins[0] || Object.values(stageSkins)[0]);
      if (!skinName || !player?.skeleton?.data?.findSkin(skinName)) return;
      player.skeleton.setSkinByName(skinName);
      player.skeleton.setSlotsToSetupPose();
      player.animationState.apply(player.skeleton);
    }

    function pickIdle(stage) {
      if (!stage) return stageModel?.fallbackIdle;
      return stage.idles[0] || stageModel.fallbackIdle;
    }

    function nextStageId() {
      const idx = stageModel.stageIds.indexOf(currentStage);
      return idx >= 0 ? stageModel.stageIds[idx + 1] : null;
    }

    function defaultStageToolId(stageNo, tools = null) {
      const stageTools = tools || getStageTools(stageModel?.stages?.get(stageNo));
      if (stageTools.includes(0)) return 0;
      return stageTools[0] ?? 0;
    }

    function uniq(values) {
      return [...new Set(values)];
    }

    function getStageTools(stage) {
      const fromSkins = currentEntry ? Object.keys(STAGE_TOOL_SKINS[currentEntry.id]?.[currentStage] || {}).map(Number) : [];
      const fromPoints = (stage?.points || []).map(pointToolId);
      const fromPrefab = currentEntry ? Object.keys(prefabActionsFor(currentEntry.id) || {})
        .map(key => key.split("_").map(Number))
        .filter(([stageNo]) => stageNo === currentStage)
        .map(([, , toolId]) => toolId) : [];
      return uniq([...fromSkins, ...fromPoints, ...fromPrefab]).filter(n => Number.isFinite(n)).sort((a, b) => a - b);
    }

    function pointToolId(name) {
      const m = name.match(/tool(\d+)/);
      return m ? Number(m[1]) : 0;
    }

    function prefabPointKeyFromName(name) {
      const m = name.match(/^point(\d+)_(\d+)/);
      if (!m) return null;
      return `${Number(m[1])}_${Number(m[2])}_${pointToolId(name)}`;
    }

    function prefabPointAction(name) {
      if (!currentEntry) return null;
      const key = prefabPointKeyFromName(name);
      if (!key) return null;
      return prefabActionsFor(currentEntry.id)?.[key] || null;
    }

    function currentPrefabActions() {
      const actions = currentEntry ? prefabActionsFor(currentEntry.id) : null;
      if (!actions) return [];
      return Object.entries(actions)
        .map(([key, action]) => {
          const [stageNo, pointId, toolId] = key.split("_").map(Number);
          return { key, action, stageNo, pointId, toolId };
        })
        .filter(item => item.stageNo === currentStage)
        .filter(item => selectedToolId === null || item.toolId === selectedToolId)
        .filter(item => !item.action.hidden)
        .filter(item => isPrefabActionVisible(item.action))
        .sort((a, b) => a.pointId - b.pointId);
    }

    function isPrefabActionVisible(action) {
      if (action.visibleWhen?.some(flag => !interactionState[flag])) return false;
      if (currentEntry?.id !== "illust_dating4" || currentStage !== 2) return true;
      if (action.requiresMode) return teresseToolMode === action.requiresMode;
      return !teresseToolMode || action.selectMode || action.alwaysVisible;
    }

    function isDating18CardStage() {
      return currentEntry?.id === "illust_dating18" && currentStage === 6;
    }

    function clearCardGameTimers() {
      cardGameTimers.forEach(clearTimeout);
      cardGameTimers = [];
    }

    function resetCardGame(render) {
      clearCardGameTimers();
      cardGameState = isDating18CardStage() ? { phase: "ready" } : null;
      if (render && currentEntry && stageModel) renderHotzones(currentPrefabActions());
    }

    function scheduleCardGame(delay, callback) {
      const timer = setTimeout(() => {
        cardGameTimers = cardGameTimers.filter(item => item !== timer);
        callback();
      }, delay);
      cardGameTimers.push(timer);
    }

    function playCardAnimation(name, completeBehavior = "none") {
      if (!player || !animationExists(name)) return false;
      restoringIdle = false;
      advanceTargetStage = null;
      advanceLastMotion = null;
      clearTimeout(advanceTimer);
      advanceTimer = null;
      if (cardGameState) {
        cardGameState.animation = name;
        cardGameState.completeBehavior = completeBehavior;
      }
      player.animationState.data.defaultMix = 0.2;
      player.setAnimation(name, false);
      player.play();
      animList.querySelectorAll(".body-anim").forEach(x => x.classList.remove("active"));
      return true;
    }

    function playCardDeal() {
      if (!isDating18CardStage() || !player) return;
      clearCardGameTimers();
      const handIndex = Math.floor(Math.random() * DATING18_CARD_GAME.hands.length);
      const hand = DATING18_CARD_GAME.hands[handIndex];
      cardGameState = { phase: "dealing", handIndex };
      renderHotzones(currentPrefabActions());
      if (!playCardAnimation(hand.deal, "idle-if-resolving")) {
        resetCardGame(true);
        return;
      }
      const [openAt, closeAt] = DATING18_CARD_GAME.handWindow;
      scheduleCardGame(openAt, () => {
        if (cardGameState?.phase !== "dealing" || cardGameState.handIndex !== handIndex) return;
        cardGameState.phase = "hand";
        renderHotzones(currentPrefabActions());
      });
      scheduleCardGame(closeAt, () => {
        if (cardGameState?.phase !== "hand" || cardGameState.handIndex !== handIndex) return;
        cardGameState.phase = "resolving";
        renderHotzones(currentPrefabActions());
      });
    }

    function playCardChoice(pointId) {
      if (cardGameState?.phase !== "hand") return;
      const hand = DATING18_CARD_GAME.hands[cardGameState.handIndex];
      if (!hand) return;
      clearCardGameTimers();
      const outcome = DATING18_CARD_GAME.matchingSuit.includes(pointId)
        ? "match"
        : DATING18_CARD_GAME.specialClubs.includes(pointId) ? "club" : "mismatch";
      cardGameState = { phase: "resolving", handIndex: cardGameState.handIndex, pointId, outcome };
      renderHotzones(currentPrefabActions());
      const resultPoint = pointId === hand.redeal ? null : DATING18_CARD_GAME.results[pointId];
      const completeBehavior = resultPoint ? "hold" : "idle";
      if (!playCardAnimation(`mix6_${pointId}_1`, completeBehavior)) {
        resetCardGame(true);
        return;
      }
      if (pointId === hand.redeal) return;
      if (!resultPoint) return;
      const openAt = DATING18_CARD_GAME.resultOpenAt[resultPoint];
      scheduleCardGame(openAt, () => {
        if (cardGameState?.pointId !== pointId) return;
        cardGameState.phase = "result";
        cardGameState.resultPoint = resultPoint;
        renderHotzones(currentPrefabActions());
      });
    }

    function playCardResult(resultPoint) {
      if (cardGameState?.phase !== "result" || cardGameState.resultPoint !== resultPoint) return;
      clearCardGameTimers();
      cardGameState.phase = "special";
      renderHotzones(currentPrefabActions());
      if (!playCardAnimation(`mix6_${resultPoint}_1`, "idle")) {
        resetCardGame(true);
        return;
      }
      const [openAt, closeAt] = DATING18_CARD_GAME.finishWindows[resultPoint];
      scheduleCardGame(openAt, () => {
        if (cardGameState?.phase !== "special" || cardGameState.resultPoint !== resultPoint) return;
        cardGameState.phase = "finish";
        renderHotzones(currentPrefabActions());
      });
      scheduleCardGame(closeAt, () => {
        if (cardGameState?.phase !== "finish" || cardGameState.resultPoint !== resultPoint) return;
        cardGameState.phase = "special";
        renderHotzones(currentPrefabActions());
      });
    }

    function playCardFinish() {
      if (cardGameState?.phase !== "finish") return;
      clearCardGameTimers();
      cardGameState.phase = "resolving";
      renderHotzones(currentPrefabActions());
      if (!playCardAnimation("mix6_34_1", "idle")) resetCardGame(true);
    }

    function handleCardAnimationComplete(completed) {
      if (!cardGameState || cardGameState.phase === "ready") return false;
      if (cardGameState.animation !== completed) return true;
      const behavior = cardGameState.completeBehavior;
      cardGameState.animation = null;
      cardGameState.completeBehavior = "none";
      if (behavior === "idle" || (behavior === "idle-if-resolving" && cardGameState.phase === "resolving")) {
        playIdle();
      }
      return true;
    }

    function renderCardGameHotzones() {
      if (!isDating18CardStage() || !cardGameState || cardGameState.phase === "ready") return false;
      if (cardGameState.phase === "hand") {
        const hand = DATING18_CARD_GAME.hands[cardGameState.handIndex];
        const points = [hand.redeal, ...hand.cards];
        points.forEach((pointId, index) => {
          const [cx, cy] = hand.centers[index];
          const zone = { x: cx - 43.75, y: cy - 43.75, width: 87.5, height: 87.5 };
          const box = hotzoneToScreenBox(zone);
          if (!box) return;
          const label = index === 0
            ? "重发"
            : DATING18_CARD_GAME.matchingSuit.includes(pointId)
              ? "同花色"
              : DATING18_CARD_GAME.specialClubs.includes(pointId) ? "梅花" : "其他花色";
          const b = makeHotzoneButton(box, label, `牌局互动 · point6_${pointId}`, "card-zone");
          b.onclick = () => playCardChoice(pointId);
          hotzoneLayer.appendChild(b);
        });
      } else if (cardGameState.phase === "result") {
        const box = fullCanvasHotzoneBox();
        const outcome = cardGameState.outcome === "match" ? "同花色" : "不同花色";
        const b = makeHotzoneButton(box, `${outcome} · 再点一次画面`, `牌局结果 · point6_${cardGameState.resultPoint}`, "card-result-zone");
        b.onclick = () => playCardResult(cardGameState.resultPoint);
        hotzoneLayer.appendChild(b);
      } else if (cardGameState.phase === "finish") {
        const box = fullCanvasHotzoneBox();
        const b = makeHotzoneButton(box, "结束", "牌局结束 · point6_34", "card-result-zone");
        b.onclick = () => playCardFinish();
        hotzoneLayer.appendChild(b);
      }
      return true;
    }

    function renderHotzones(prefabActions) {
      cancelHotzoneGesture();
      suppressHotzoneClickUntil = 0;
      suppressHotzoneClickElement = null;
      cancelPrefabDrag();
      hotzoneLayer.innerHTML = "";
      hotzoneFollowTracking = false;
      activeGyroAction = null;
      activeGyroPointKey = null;
      gyroBaseline = null;
      if (!currentEntry) return;
      if (hotzonesSuppressed) return;
      if (renderCardGameHotzones()) return;
      if (!prefabActions.length) return;
      const hiddenBox = { left: -999, top: -999, width: 1, height: 1 };
      const rendered = prefabActions.map((item, idx) => {
        if (item.action.hotzoneVisibleWhen?.some(flag => !interactionState[flag])) return null;
        const zone = prefabHotzone(currentEntry.id, item.key);
        const rawBox = zone && hotzoneToScreenBox(zone);
        const box = zone && isGiantClickReceiverZone(zone)
          ? (fullCanvasHotzoneBox() || rawBox)
          : rawBox;
        if (!box && !hotzoneUsesFollowBone(zone)) return null;
        return { item, zone, box: box || hiddenBox, visible: Boolean(box), labelIndex: idx, area: box ? box.width * box.height : 0 };
      }).filter(Boolean).sort(compareHotzoneStack);
      hotzoneFollowTracking = rendered.some(({ zone }) => hotzoneUsesFollowBone(zone));
      rendered.forEach(({ item, zone, box, visible, labelIndex }) => {
        const b = makeHotzoneButton(
          box,
          isGiantClickReceiverZone(zone) ? "任意处" : hotzoneLabel(item.action, labelIndex, item.key),
          prefabActionTitle(item.action, item.key, zone),
          [
            item.action.kind === "gyro" ? "gyro-zone" : item.action.kind === "card" ? "card-zone" : "body-zone",
            zone?.shape === 1 ? "ellipse-zone" : "",
            isGiantClickReceiverZone(zone) ? "giant-click-receiver" : "",
          ].filter(Boolean).join(" "),
        );
        b.dataset.key = item.key;
        b.hidden = !visible;
        if (item.action.longPress) {
          b.addEventListener("pointerdown", event => beginLongPress(item.action, b, event, item.key));
          b.addEventListener("pointerup", event => cancelLongPress(true, event));
          b.addEventListener("pointercancel", event => cancelLongPress(true, event));
          b.addEventListener("click", event => event.preventDefault());
        } else if (item.action.kind === "drag") {
          b.addEventListener("pointerdown", event => beginPrefabDrag(item.action, b, event, item.key));
          b.addEventListener("pointermove", event => movePrefabDrag(event));
          b.addEventListener("pointerup", event => endPrefabDrag(event));
          b.addEventListener("pointercancel", event => cancelPrefabDrag(event));
          b.addEventListener("click", event => event.preventDefault());
        } else if (item.action.gyro?.actionType === 1) {
          b.dataset.label = "左右倾斜";
          activeGyroAction = item.action;
          activeGyroPointKey = item.key;
          b.addEventListener("pointerdown", event => beginGyroDrag(item.action, b, event, item.key));
          b.addEventListener("pointermove", event => moveGyroDrag(event));
          b.addEventListener("pointerup", event => cancelGyroDrag(event));
          b.addEventListener("pointercancel", event => cancelGyroDrag(event));
          b.addEventListener("click", event => event.preventDefault());
        } else if (item.action.cardGame === "deal") {
          b.onclick = () => playCardDeal();
        } else {
          b.onclick = () => playPrefabAction(item.action, null, item.key);
        }
        hotzoneLayer.appendChild(b);
      });
    }

    function compareHotzoneStack(a, b) {
      const priorityDiff = (a.item.action.hotzonePriority || 0) - (b.item.action.hotzonePriority || 0);
      if (priorityDiff) return priorityDiff;
      const areaDiff = b.area - a.area;
      if (Math.abs(areaDiff) > 1) return areaDiff;
      const kindRank = action => action.kind === "drag" ? 0 : action.kind === "gyro" ? 1 : 2;
      return kindRank(a.item.action) - kindRank(b.item.action)
        || a.item.pointId - b.item.pointId
        || a.item.key.localeCompare(b.item.key);
    }

    function makeHotzoneButton(box, label, title, className) {
      const b = document.createElement("button");
      b.type = "button";
      b.className = `hotzone ${className}`;
      b.dataset.label = label;
      b.title = title;
      b.style.left = box.left + "%";
      b.style.top = box.top + "%";
      b.style.width = box.width + "%";
      b.style.height = box.height + "%";
      return b;
    }

    function refreshHotzonePositions() {
      if (!currentEntry || !stageModel) return;
      const byKey = new Map(currentPrefabActions().map(item => [item.key, item]));
      hotzoneLayer.querySelectorAll(".hotzone[data-key]").forEach(button => {
        const item = byKey.get(button.dataset.key);
        const zone = item && prefabHotzone(currentEntry.id, item.key);
        const rawBox = zone && hotzoneToScreenBox(zone);
        const box = zone && isGiantClickReceiverZone(zone)
          ? (fullCanvasHotzoneBox() || rawBox)
          : rawBox;
        if (!box) {
          button.hidden = true;
          return;
        }
        button.hidden = false;
        button.style.left = box.left + "%";
        button.style.top = box.top + "%";
        button.style.width = box.width + "%";
        button.style.height = box.height + "%";
        maybeFreezeHoldPoseAtVisibleTarget(button.dataset.key);
      });
    }

    function beginHotzoneGestureArbitration(event) {
      if (!shouldArbitrateHotzones() || activeHotzoneGesture || activePrefabDrag) return;
      const candidates = hotzoneCandidatesAt(event.clientX, event.clientY);
      const touches = candidates.filter(candidate => candidate.item.action.kind === "touch" && !candidate.item.action.longPress);
      const drags = candidates.filter(candidate => candidate.item.action.kind === "drag");
      if (!touches.length || !drags.length) return;
      event.preventDefault();
      event.stopPropagation();
      event.stopImmediatePropagation();
      const clickTarget = chooseHotzoneClickTarget(touches);
      const dragTarget = drags.slice().sort((a, b) => a.area - b.area || a.item.pointId - b.item.pointId)[0];
      const threshold = hotzoneGestureThreshold(dragTarget.element);
      activeHotzoneGesture = {
        pointerId: event.pointerId,
        startX: event.clientX,
        startY: event.clientY,
        threshold,
        clickTarget,
        dragTarget,
      };
      attachHotzoneGestureWindowListeners();
    }

    function shouldArbitrateHotzones() {
      return currentEntry?.id === "illust_dating6" && currentStage >= 1 && currentStage <= 5;
    }

    function hotzoneCandidatesAt(clientX, clientY) {
      const byKey = new Map(currentPrefabActions().map(item => [item.key, item]));
      return Array.from(hotzoneLayer.querySelectorAll(".hotzone[data-key]"))
        .map(element => {
          if (element.hidden) return null;
          const item = byKey.get(element.dataset.key);
          if (!item) return null;
          const rect = element.getBoundingClientRect();
          if (
            clientX < rect.left || clientX > rect.right ||
            clientY < rect.top || clientY > rect.bottom
          ) return null;
          const zone = prefabHotzone(currentEntry?.id, item.key);
          if (!hotzoneContainsPoint(zone, rect, clientX, clientY)) return null;
          return { element, item, rect, area: Math.max(1, rect.width * rect.height) };
        })
        .filter(Boolean);
    }

    function hotzoneContainsPoint(zone, rect, clientX, clientY) {
      if (!zone || zone.shape !== 1) return true;
      const rx = rect.width / 2;
      const ry = rect.height / 2;
      if (rx <= 0 || ry <= 0) return false;
      const nx = (clientX - (rect.left + rx)) / rx;
      const ny = (clientY - (rect.top + ry)) / ry;
      return nx * nx + ny * ny <= 1;
    }

    function chooseHotzoneClickTarget(touches) {
      const sorted = touches.slice().sort((a, b) => {
        const giantDiff = Number(isGiantClickReceiver(a)) - Number(isGiantClickReceiver(b));
        return giantDiff || a.area - b.area || a.item.pointId - b.item.pointId;
      });
      return sorted[0];
    }

    function isGiantClickReceiver(candidate) {
      const zone = prefabHotzone(currentEntry?.id, candidate.item.key);
      if (isGiantClickReceiverZone(zone)) return true;
      const layerRect = hotzoneLayer.getBoundingClientRect();
      if (!layerRect.width || !layerRect.height) return false;
      return candidate.area >= layerRect.width * layerRect.height * 0.7;
    }

    function isGiantClickReceiverZone(zone) {
      return currentEntry?.id === "illust_dating6" && Boolean(zone && (zone.width >= 1800 || zone.height >= 1800));
    }

    function hotzoneGestureThreshold(element) {
      const rect = element.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height);
      return Math.max(10, Math.min(28, size * 0.08));
    }

    function attachHotzoneGestureWindowListeners() {
      detachHotzoneGestureWindowListeners();
      const onMove = event => moveHotzoneGesture(event);
      const onEnd = event => endHotzoneGesture(event);
      const onCancel = event => cancelHotzoneGesture(event);
      const onBlur = () => cancelHotzoneGesture();
      window.addEventListener("pointermove", onMove, true);
      window.addEventListener("pointerup", onEnd, true);
      window.addEventListener("pointercancel", onCancel, true);
      window.addEventListener("blur", onBlur);
      activeHotzoneGestureListeners = { onMove, onEnd, onCancel, onBlur };
    }

    function detachHotzoneGestureWindowListeners() {
      const listeners = activeHotzoneGestureListeners;
      if (!listeners) return;
      window.removeEventListener("pointermove", listeners.onMove, true);
      window.removeEventListener("pointerup", listeners.onEnd, true);
      window.removeEventListener("pointercancel", listeners.onCancel, true);
      window.removeEventListener("blur", listeners.onBlur);
      activeHotzoneGestureListeners = null;
    }

    function moveHotzoneGesture(event) {
      const gesture = activeHotzoneGesture;
      if (!gesture || event.pointerId !== gesture.pointerId) return;
      event.preventDefault();
      event.stopPropagation();
      event.stopImmediatePropagation();
      const dx = event.clientX - gesture.startX;
      const dy = event.clientY - gesture.startY;
      if (Math.hypot(dx, dy) < gesture.threshold) return;
      const { dragTarget } = gesture;
      activeHotzoneGesture = null;
      detachHotzoneGestureWindowListeners();
      beginPrefabDrag(dragTarget.item.action, dragTarget.element, event, dragTarget.item.key, gesture.startX, gesture.startY);
      movePrefabDrag(event);
    }

    function endHotzoneGesture(event) {
      const gesture = activeHotzoneGesture;
      if (!gesture || event.pointerId !== gesture.pointerId) return;
      event.preventDefault();
      event.stopPropagation();
      event.stopImmediatePropagation();
      activeHotzoneGesture = null;
      detachHotzoneGestureWindowListeners();
      const { clickTarget } = gesture;
      suppressHotzoneClickUntil = performance.now() + 600;
      suppressHotzoneClickElement = clickTarget?.element || null;
      if (clickTarget) playPrefabAction(clickTarget.item.action, null, clickTarget.item.key);
    }

    function cancelHotzoneGesture(event) {
      const gesture = activeHotzoneGesture;
      if (event && gesture && event.pointerId !== gesture.pointerId) return;
      activeHotzoneGesture = null;
      detachHotzoneGestureWindowListeners();
    }

    function suppressHandledHotzoneClick(event) {
      if (performance.now() > suppressHotzoneClickUntil) return;
      if (
        suppressHotzoneClickElement &&
        event.target !== suppressHotzoneClickElement &&
        !suppressHotzoneClickElement.contains(event.target)
      ) return;
      event.preventDefault();
      event.stopPropagation();
      event.stopImmediatePropagation();
      suppressHotzoneClickUntil = 0;
      suppressHotzoneClickElement = null;
    }

    function beginPrefabDrag(action, element, event, pointKey = null, startX = event.clientX, startY = event.clientY) {
      if (!player || activePrefabDrag) return;
      cancelHoldPoseFreeze();
      event.preventDefault();
      event.stopPropagation();
      try {
        element.setPointerCapture(event.pointerId);
      } catch (e) { /* pointer capture is optional */ }
      element.classList.add("holding");
      const rect = element.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height);
      const threshold = Math.max(10, Math.min(28, size * 0.08));
      activePrefabDrag = {
        action,
        element,
        pointKey,
        engaged: false,
        resolved: false,
        engagedAt: 0,
        pointerId: event.pointerId,
        startX,
        startY,
        threshold,
        successThreshold: Math.max(threshold * 2.4, Math.min(150, Math.max(48, size * 0.36))),
      };
      attachPrefabDragWindowListeners();
    }

    // 对照真机 SpineInteractionPoint: OnBeginDrag 在 track 1 播 mix_1;
    // 拖动过程中命中后立刻在 track 0 播 motion 并推进阶段,松手本身不触发成功。
    function movePrefabDrag(event) {
      const drag = activePrefabDrag;
      if (!drag || event.pointerId !== drag.pointerId) return;
      event.preventDefault();
      const dx = event.clientX - drag.startX;
      const dy = event.clientY - drag.startY;
      const distance = Math.hypot(dx, dy);
      if (!drag.engaged) {
        if (distance < drag.threshold) return;
        drag.engaged = true;
        drag.engagedAt = performance.now();
        playDragBegin(drag.action, drag.pointKey);
        startDragFollow(drag.pointKey);
      }
      moveDragFollow(dx, dy);
      if (!drag.resolved && shouldResolvePrefabDrag(drag, distance, event)) {
        drag.resolved = true;
        playDragSuccess(drag.action, drag.pointKey);
      }
    }

    function endPrefabDrag(event) {
      const drag = activePrefabDrag;
      if (!drag) return;
      if (event && event.pointerId !== drag.pointerId) return;
      const { action, pointKey, engaged, resolved } = drag;
      releasePrefabDragPointer(drag);
      activePrefabDrag = null;
      detachPrefabDragWindowListeners();
      stopDragFollow();
      if (engaged && !resolved) playDragRelease(action, pointKey);
    }

    function cancelPrefabDrag(event) {
      const drag = activePrefabDrag;
      if (!drag) {
        detachPrefabDragWindowListeners();
        if (dragHolding) { dragHolding = false; clearDragOverlay(); }
        stopDragFollow();
        return;
      }
      if (event && event.pointerId !== drag.pointerId) return;
      const engaged = drag.engaged;
      releasePrefabDragPointer(drag);
      activePrefabDrag = null;
      detachPrefabDragWindowListeners();
      stopDragFollow();
      if (engaged && dragHolding) { dragHolding = false; clearDragOverlay(); }
    }

    function attachPrefabDragWindowListeners() {
      detachPrefabDragWindowListeners();
      const onMove = event => movePrefabDrag(event);
      const onEnd = event => endPrefabDrag(event);
      const onCancel = event => cancelPrefabDrag(event);
      const onBlur = () => cancelPrefabDrag();
      window.addEventListener("pointermove", onMove, true);
      window.addEventListener("pointerup", onEnd, true);
      window.addEventListener("pointercancel", onCancel, true);
      window.addEventListener("blur", onBlur);
      activePrefabDragListeners = { onMove, onEnd, onCancel, onBlur };
    }

    function detachPrefabDragWindowListeners() {
      const listeners = activePrefabDragListeners;
      if (!listeners) return;
      window.removeEventListener("pointermove", listeners.onMove, true);
      window.removeEventListener("pointerup", listeners.onEnd, true);
      window.removeEventListener("pointercancel", listeners.onCancel, true);
      window.removeEventListener("blur", listeners.onBlur);
      activePrefabDragListeners = null;
    }

    function releasePrefabDragPointer(drag) {

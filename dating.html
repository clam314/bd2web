      drag.element.classList.remove("holding");
      try {
        if (drag.element.hasPointerCapture(drag.pointerId)) {
          drag.element.releasePointerCapture(drag.pointerId);
        }
      } catch (e) { /* element may already be detached */ }
    }

    // 真机 OnDrag 里 set_position 移动点位 GO，点位骨骼(SkeletonUtilityBone mode=Override,
    // boneName=GO 名去掉" [Override]")跟随 GO → 拖拽区域网格跟手变形。web 端等价实现：
    // 先跑一遍世界变换拿到当前父级矩阵，再移动点位骨骼并重跑约束，让 IK target 同帧生效。
    function attachDragFollowHook(p) {
      const orig = p.skeleton.updateWorldTransform.bind(p.skeleton);
      p.skeleton.updateWorldTransform = () => {
        orig();
        if (!dragFollow || dragFollow.skeleton !== p.skeleton) return;
        const bone = dragFollow.bone;
        const target = { x: dragFollow.targetWorldX, y: dragFollow.targetWorldY };
        const local = bone.parent ? bone.parent.worldToLocal(target) : target;
        bone.x = local.x;
        bone.y = local.y;
        orig();
      };
    }

    function startDragFollow(pointKey) {
      if (!player?.skeleton || !currentEntry || !pointKey) return;
      const zone = prefabHotzone(currentEntry.id, pointKey);
      const boneName = zone?.source?.replace(" [Override]", "");
      const bone = boneName ? player.skeleton.findBone(boneName) : null;
      const canvas = player.canvas;
      const viewport = player.viewport;
      if (!bone || !canvas || !viewport?.width || !viewport?.height) return;
      const rect = canvas.getBoundingClientRect();
      if (!rect.width || !rect.height) return;
      const zoom = canvas.height / canvas.width > viewport.height / viewport.width
        ? viewport.width / canvas.width
        : viewport.height / canvas.height;
      dragFollow = {
        skeleton: player.skeleton,
        bone,
        baseX: bone.x,
        baseY: bone.y,
        targetWorldX: bone.worldX,
        targetWorldY: bone.worldY,
        baseWorldX: bone.worldX,
        baseWorldY: bone.worldY,
        pxToWorldX: canvas.width / rect.width * zoom,
        pxToWorldY: canvas.height / rect.height * zoom,
      };
    }

    function moveDragFollow(dxPx, dyPx) {
      if (!dragFollow) return;
      dragFollow.targetWorldX = dragFollow.baseWorldX + dxPx * dragFollow.pxToWorldX;
      dragFollow.targetWorldY = dragFollow.baseWorldY - dyPx * dragFollow.pxToWorldY;
    }

    function stopDragFollow() {
      if (!dragFollow) return;
      const { bone, baseX, baseY } = dragFollow;
      bone.x = baseX;
      bone.y = baseY;
      dragFollow = null;
    }

    function shouldResolvePrefabDrag(drag, distance, event) {
      const action = drag.action;
      if (!action) return false;
      const hasSuccessMotion = (action.motions || []).some(animationExists);
      const hasStageAdvance = !!resolveActionNextStage(action);
      if (!hasSuccessMotion && !hasStageAdvance) return false;
      if (Array.isArray(action.destinations) && action.destinations.length) {
        const hitIndex = destinationHitIndex(action, event.clientX, event.clientY);
        if (hitIndex !== null) return hitIndex >= 0;
      }
      return distance >= drag.successThreshold && performance.now() - drag.engagedAt >= 120;
    }

    function shouldHoldPrefabActionPose(action, pointKey) {
      if (action?.kind !== "touch" || !pointKey) return false;
      if (action.longPress || action.randomMix) return false;
      if (action.clickMax && !action._touchCompleted) return false;
      if (!action.clickMax && action.stopMix) return false;
      if (action.nextStage || action.setFlag || (action.motions || []).length) return false;
      return (action.mix || []).length === 1 && holdPoseTargets(pointKey).length > 0;
    }

    function shouldUseTouchOverlayTrack(action, sequence) {
      if (!sequence.length || action?.longPress) return false;
      return OVERLAY_TRACK_INTERACTION_IDS.has(currentEntry?.id);
    }

    function destinationHitIndex(action, clientX, clientY) {
      if (!Array.isArray(action?.destinations) || !action.destinations.length) return -1;
      const layerRect = hotzoneLayer.getBoundingClientRect();
      if (!layerRect.width || !layerRect.height) return -1;
      let hasProjectedDestination = false;
      for (let i = 0; i < action.destinations.length; i++) {
        const box = hotzoneToScreenBox(action.destinations[i]);
        if (!box) continue;
        hasProjectedDestination = true;
        const left = layerRect.left + box.left / 100 * layerRect.width;
        const top = layerRect.top + box.top / 100 * layerRect.height;
        const width = box.width / 100 * layerRect.width;
        const height = box.height / 100 * layerRect.height;
        const pad = Math.max(10, Math.min(24, Math.min(width, height) * 0.2));
        if (
          clientX >= left - pad && clientX <= left + width + pad &&
          clientY >= top - pad && clientY <= top + height + pad
        ) {
          return Number.isInteger(action.destinations[i].index) ? action.destinations[i].index : i;
        }
      }
      return hasProjectedDestination ? -1 : null;
    }

    function clearDragOverlay(mix = 0.12) {
      if (!player) return;
      try {
        player.animationState.setEmptyAnimation(1, mix);
        player.play();
      } catch (e) { /* best-effort cleanup */ }
    }

    function playDragBegin(action, pointKey = null) {
      if (!player || !action) return;
      try {
        if (!canPlayAction(action)) return;
        clearError();
        cancelHoldPoseFreeze();
        const first = (action.mix || []).filter(animationExists)[0] || null;
        restoringIdle = false;
        advanceTargetStage = null;
        advanceLastMotion = null;
        activeInteractionVoiceKey = pointKey;
        activeInteractionMotionNames = new Set(action.motions || []);
        clearTimeout(advanceTimer);
        advanceTimer = null;
        dragHolding = true;
        if (pointKey && currentEntry) {
          datingAudio.playInteractionVoice(currentEntry.id, pointKey, "voice");
        }
        if (first) {
          player.animationState.data.defaultMix = 0.08;
          // 真机 mix 播放入口(0x7804FA4)是 SetSpineAnimationExternal(name, track=1, loop=false, onComplete)：
          // 不循环。loop=true 只出现在拖到 _destinations 目的地后播 _playMotionNames 的路径(0x780C408)。
          player.animationState.setAnimation(1, first, false);
          player.play();
          if (currentEntry) datingAudio.playAnimation(currentEntry.id, first);
        }
        animList.querySelectorAll(".body-anim").forEach(x => x.classList.remove("active"));
      } catch (e) { showError("播放拖拽起始失败：" + e.message); }
    }

    function playDragSuccess(action, pointKey = null) {
      if (!player || !action) return;
      try {
        dragHolding = false;
        stopDragFollow();
        // 拖拽成功也应用 setFlag(dating13 兔子玩偶震动解锁隐藏点)；只对带 setFlag 的 action 生效,
        // 不给普通拖拽增加整层热区重建。
        if (action.setFlag) applyActionState(action);
        const motions = (action.motions || []).filter(animationExists);
        const targetStage = resolveActionNextStage(action);
        advanceTargetStage = targetStage;
        advanceLastMotion = motions.length ? motions[motions.length - 1] : null;
        if (motions.length && OVERLAY_TRACK_INTERACTION_IDS.has(currentEntry?.id)) {
          // 多姿势组角色的成功 motion 也走 track 1：直接替换 track 1 上的拖拽 hold mix，
          // 避免 track 0 交叉淡入把 setup 附件闪出来(两双手)。
          advanceLastMotion = null;
          playOverlaySequence(motions, targetStage);
          player.play();
          if (targetStage) {
            const duration = motions.reduce((sum, anim) => sum + animationDuration(anim), 0);
            const delay = Math.min(9000, Math.max(1200, duration * 1000 + 300));
            advanceTimer = setTimeout(() => {
              if (advanceTargetStage === targetStage) enterStage(targetStage);
            }, delay);
          }
        } else if (motions.length) {
          clearDragOverlay(0.08);
          player.animationState.data.defaultMix = 0.12;
          player.setAnimation(motions[0], false);
          motions.slice(1).forEach(anim => player.animationState.addAnimation(0, anim, false, 0));
          player.play();
          const duration = motions.reduce((sum, anim) => sum + animationDuration(anim), 0);
          if (targetStage) {
            const delay = Math.min(9000, Math.max(1200, duration * 1000 + 300));
            advanceTimer = setTimeout(() => {
              if (advanceTargetStage === targetStage) enterStage(targetStage);
            }, delay);
          }
        } else if (targetStage) {
          if (!OVERLAY_TRACK_INTERACTION_IDS.has(currentEntry?.id)) clearDragOverlay(0.08);
          advanceTimer = setTimeout(() => {
            if (advanceTargetStage === targetStage) enterStage(targetStage);
          }, 600);
        } else {
          if (!OVERLAY_TRACK_INTERACTION_IDS.has(currentEntry?.id)) clearDragOverlay(0.08);
          playIdle();
        }
      } catch (e) { showError("播放拖拽成功失败：" + e.message); }
    }

    function playDragRelease(action, pointKey = null) {
      if (!player || !action) return;
      try {
        dragHolding = false;
        // 无 motion/推进的普通拖拽松手也应用 setFlag(dating13 兔子玩偶:震动结束才解锁隐藏点)。
        if (action.setFlag) applyActionState(action);
        const releases = (action.mix || []).slice(1).filter(animationExists);
        if (!releases.length) {
          clearDragOverlay();
          return;
        }
        player.animationState.data.defaultMix = 0.08;
        player.animationState.setAnimation(1, releases[0], false);
        releases.slice(1).forEach(anim => player.animationState.addAnimation(1, anim, false, 0));
        player.animationState.addEmptyAnimation(1, 0.12, 0);
        player.play();
        // 拖拽动画在 track 1 上播，start 监听只覆盖 track 0，SFX 需手动触发。
        if (currentEntry) datingAudio.playAnimation(currentEntry.id, releases[0]);
      } catch (e) { showError("播放拖拽释放失败：" + e.message); }
    }

    function beginGyroDrag(action, element, event, pointKey = null) {
      if (!player || activeGyroDrag) return;
      cancelHoldPoseFreeze();
      event.preventDefault();
      event.stopPropagation();
      try {
        element.setPointerCapture(event.pointerId);
      } catch (e) { /* pointer capture is optional */ }
      element.classList.add("holding");
      activeGyroDrag = {
        action,
        element,
        pointKey,
        pointerId: event.pointerId,
        startX: event.clientX,
        threshold: Math.max(72, stage.clientWidth * action.gyro.moveThreshold / 100),
      };
    }

    function moveGyroDrag(event) {
      const drag = activeGyroDrag;
      if (!drag || event.pointerId !== drag.pointerId) return;
      const deltaX = event.clientX - drag.startX;
      if (Math.abs(deltaX) < drag.threshold) return;
      activeGyroDrag = null;
      drag.element.classList.remove("holding");
      try {
        if (drag.element.hasPointerCapture(drag.pointerId)) {
          drag.element.releasePointerCapture(drag.pointerId);
        }
      } catch (e) { /* element may already be detached */ }
      playGyroAction(drag.action, deltaX < 0 ? 0 : 1, drag.pointKey);
    }

    function cancelGyroDrag(event) {
      const drag = activeGyroDrag;
      if (!drag) return;
      if (event && event.pointerId !== drag.pointerId) return;
      activeGyroDrag = null;
      drag.element.classList.remove("holding");
      try {
        if (drag.element.hasPointerCapture(drag.pointerId)) {
          drag.element.releasePointerCapture(drag.pointerId);
        }
      } catch (e) { /* element may already be detached */ }
    }

    function playGyroAction(action, destinationIndex, pointKey = null) {
      if (!action) return;
      action.destinationIndex = destinationIndex;
      playPrefabAction(action, null, pointKey);
    }

    async function enableDeviceOrientation() {
      if (deviceOrientationEnabled || typeof DeviceOrientationEvent === "undefined") return;
      try {
        if (typeof DeviceOrientationEvent.requestPermission === "function") {
          const result = await DeviceOrientationEvent.requestPermission();
          if (result !== "granted") return;
        }
        window.addEventListener("deviceorientation", handleDeviceOrientation);
        deviceOrientationEnabled = true;
        gyroBaseline = null;
      } catch (e) {
        showError("浏览器未允许设备方向感应，可改用画面左右拖动。");
      }
    }

    function handleDeviceOrientation(event) {
      if (!activeGyroAction || selectedToolId !== 14 || advanceTargetStage) return;
      const angle = screen.orientation?.angle ?? window.orientation ?? 0;
      const value = Math.abs(angle) === 90 ? event.beta : event.gamma;
      if (!Number.isFinite(value)) return;
      if (gyroBaseline === null) {
        gyroBaseline = value;
        return;
      }
      const delta = value - gyroBaseline;
      if (Math.abs(delta) < activeGyroAction.gyro.moveThreshold) return;
      const action = activeGyroAction;
      const pointKey = activeGyroPointKey;
      gyroBaseline = value;
      activeGyroAction = null;
      activeGyroPointKey = null;
      playGyroAction(action, delta < 0 ? 0 : 1, pointKey);
    }

    function beginLongPress(action, element, event, pointKey = null) {
      if (!player || activeLongPress) return;
      cancelHoldPoseFreeze();
      event.preventDefault();
      event.stopPropagation();
      try {
        element.setPointerCapture(event.pointerId);
      } catch (e) { /* pointer capture is optional */ }
      restoringIdle = true;
      advanceTargetStage = null;
      advanceLastMotion = null;
      clearTimeout(advanceTimer);
      advanceTimer = null;
      const start = (action.mix || []).find(animationExists);
      const loop = action.longPress.loop;
      if (start) {
        player.setAnimation(start, false);
        if (animationExists(loop)) player.animationState.addAnimation(0, loop, true, 0);
        player.play();
      }
      element.classList.add("holding");
      if (pointKey && currentEntry) {
        datingAudio.playInteractionVoice(currentEntry.id, pointKey, "voice");
      }
      const press = { action, element, pointKey, pointerId: event.pointerId, timer: null };
      press.timer = setTimeout(() => completeLongPress(press), action.longPress.threshold * 1000);
      activeLongPress = press;
    }

    function completeLongPress(press) {
      if (activeLongPress !== press || !player) return;
      activeLongPress = null;
      press.element.classList.remove("holding");
      const action = press.action;
      activeInteractionVoiceKey = press.pointKey;
      activeInteractionMotionNames = new Set(action.motions || []);
      const success = animationExists(action.longPress.success)
        ? action.longPress.success
        : (action.motions || []).find(animationExists);
      if (!success) {
        restoringIdle = false;
        playIdle();
        return;
      }
      const targetStage = resolveActionNextStage(action);
      restoringIdle = false;
      advanceTargetStage = targetStage;
      advanceLastMotion = success;
      player.animationState.data.defaultMix = 0.2;
      player.setAnimation(success, false);
      player.play();
      if (targetStage) {
        const delay = Math.min(9000, Math.max(1200, animationDuration(success) * 1000 + 300));
        advanceTimer = setTimeout(() => {
          if (advanceTargetStage === targetStage) enterStage(targetStage);
        }, delay);
      }
    }

    function cancelLongPress(playFailure, event) {
      const press = activeLongPress;
      if (!press) return;
      if (event && event.pointerId !== press.pointerId) return;
      clearTimeout(press.timer);
      activeLongPress = null;
      press.element.classList.remove("holding");
      try {
        if (press.element.hasPointerCapture(press.pointerId)) {
          press.element.releasePointerCapture(press.pointerId);
        }
      } catch (e) { /* element may already be detached */ }
      if (!playFailure || !player) {
        restoringIdle = false;
        return;
      }
      if (press.action.longPress.actionType === 1) {
        restoringIdle = false;
        const shortAction = {
          ...press.action,
          mix: (press.action.mix || []).slice(0, 1),
          motions: [],
          nextStage: null,
          longPress: null,
        };
        playPrefabAction(shortAction, null, press.pointKey);
        return;
      }
      const fail = press.action.longPress.fail;
      restoringIdle = false;
      advanceTargetStage = null;
      advanceLastMotion = null;
      if (animationExists(fail)) {
        player.animationState.data.defaultMix = 0.2;
        player.setAnimation(fail, false);
        player.play();
      } else {
        playIdle();
      }
    }

    function fullCanvasHotzoneBox() {
      const canvasRect = player?.canvas?.getBoundingClientRect();
      const layerRect = hotzoneLayer.getBoundingClientRect();
      if (!canvasRect || !layerRect.width || !layerRect.height) return null;
      return {
        left: roundPct((canvasRect.left - layerRect.left) / layerRect.width * 100),
        top: roundPct((canvasRect.top - layerRect.top) / layerRect.height * 100),
        width: roundPct(canvasRect.width / layerRect.width * 100),
        height: roundPct(canvasRect.height / layerRect.height * 100),
      };
    }

    function hotzoneToScreenBox(zone) {
      const canvas = player?.canvas;
      const viewport = player?.viewport;
      if (!canvas || !viewport || !currentEntry) return null;
      const canvasRect = canvas.getBoundingClientRect();
      const layerRect = hotzoneLayer.getBoundingClientRect();
      if (!canvasRect.width || !canvasRect.height || !layerRect.width || !layerRect.height) return null;

      const scale = zone.space === "skeleton" ? 1 : (HOTZONE_WORLD_SCALES[currentEntry.id] || 1);
      const followBone = hotzoneFollowBone(zone);
      const widthWorld = zone.width * scale;
      const heightWorld = zone.height * scale;
      const worldLeft = followBone ? followBone.worldX - widthWorld / 2 : zone.x * scale;
      const worldRight = followBone ? followBone.worldX + widthWorld / 2 : (zone.x + zone.width) * scale;
      const worldBottom = followBone ? followBone.worldY - heightWorld / 2 : zone.y * scale;
      const worldTop = followBone ? followBone.worldY + heightWorld / 2 : (zone.y + zone.height) * scale;
      const backingScaleX = canvas.width / canvasRect.width;
      const backingScaleY = canvas.height / canvasRect.height;
      const zoom = canvas.height / canvas.width > viewport.height / viewport.width
        ? viewport.width / canvas.width
        : viewport.height / canvas.height;
      const cameraX = viewport.x + viewport.width / 2;
      const cameraY = viewport.y + viewport.height / 2;
      const projectX = x => canvasRect.left + (canvas.width / 2 + (x - cameraX) / zoom) / backingScaleX;
      const projectY = y => canvasRect.top + (canvas.height / 2 - (y - cameraY) / zoom) / backingScaleY;

      const leftPx = Math.max(canvasRect.left, projectX(worldLeft));
      const rightPx = Math.min(canvasRect.right, projectX(worldRight));
      const topPx = Math.max(canvasRect.top, projectY(worldTop));
      const bottomPx = Math.min(canvasRect.bottom, projectY(worldBottom));
      if (rightPx <= leftPx || bottomPx <= topPx) return null;
      const width = (rightPx - leftPx) / layerRect.width * 100;
      const height = (bottomPx - topPx) / layerRect.height * 100;
      if (width < 1 || height < 1) return null;
      return {
        left: roundPct((leftPx - layerRect.left) / layerRect.width * 100),
        top: roundPct((topPx - layerRect.top) / layerRect.height * 100),
        width: roundPct(width),
        height: roundPct(height),
      };
    }

    function hotzoneFollowBone(zone) {
      if (!hotzoneUsesFollowBone(zone)) return null;
      return hotzoneSourceBone(zone);
    }

    function hotzoneSourceBone(zone) {
      const boneName = (zone?.source || "").replace(" [Override]", "");
      return boneName ? player?.skeleton?.findBone(boneName) || null : null;
    }

    // 真机上每个交互点的位置由 skel 里同名骨骼驱动(SkeletonUtilityBone)：动画把骨骼
    // 搬进画面=点出现、停到 ±50000=点消失，prefab 矩形只是尺寸。BONE_FOLLOW_HOTZONE_IDS
    // 里的角色对全部点启用骨骼定位(dating9 已验证 74 点全有同名骨骼、矩形中心==骨骼
    // setup 位)；其余角色暂只对 *_follow 源生效，逐个回归后再扩。
    function hotzoneUsesFollowBone(zone) {
      const source = zone?.source || "";
      if (source.includes("_follow")) return true;
      if (!BONE_FOLLOW_HOTZONE_IDS.has(currentEntry?.id)) return false;
      return Boolean(hotzoneSourceBone(zone));
    }

    function prefabActionDisplayLabel(action, key) {
      return PREFAB_ACTION_LABEL_OVERRIDES[currentEntry?.id]?.[key] || action.label || "";
    }

    function hotzoneLabel(action, idx, key = null) {
      const label = prefabActionDisplayLabel(action, key);
      if (label) return label.split(/[：:]/)[0].replace(/^画面/, "");
      if (action.clickMax) return `${action.clickMax}击`;
      if (action.kind === "drag") return "拖";
      if (action.kind === "gyro") return "晃";
      if (action.gauge) return "计";
      return String(idx + 1);
    }

    function roundPct(value) {
      return Math.round(value * 1000) / 1000;
    }

    function resolveActionNextStage(action) {
      if (!action?.nextStage) return null;
      if (action.nextStage === "next") return nextStageId();
      return action.nextStage;
    }

    function prefabActionLabel(action, idx, key = null) {
      const kind = action.kind === "drag" ? "拖拽" : action.kind === "gyro" ? "晃动" : "触摸";
      const target = resolveActionNextStage(action);
      const next = target ? ` -> 阶段${target}` : "";
      const parts = [prefabActionDisplayLabel(action, key) || `${kind}${idx + 1}`];
      if (action.gauge) parts.push("计量");
      if (action.clickMax) parts.push(`${action.clickMax}连击`);
      return `${parts.join(" · ")}${next}`;
    }

    function prefabActionTitle(action, key, zone) {
      const kind = action.kind === "drag" ? "拖拽" : action.kind === "gyro" ? "晃动" : "触摸";
      const pointId = Number(key?.split("_")?.[1]);
      const baseLabel = prefabActionDisplayLabel(action, key) || `${kind}${Number.isFinite(pointId) ? pointId : 1}`;
      const parts = [baseLabel];
      if (action.gauge) parts.push("计量");
      if (action.clickMax) parts.push(`${action.clickMax}连击`);
      parts.push(key);
      if (zone?.source) parts.push(zone.source);
      if (action.clickMax) {
        const reset = Number(action.clickReset) || 1;
        parts.push(`${reset}秒内连点${action.clickMax}次`);
      }
      return parts.join(" · ");
    }

    function animationExists(name) {
      return !!player?.skeleton?.data?.animations?.some(anim => anim.name === name);
    }

    function isPointVisibleForTool(name) {
      if (selectedToolId === null) return true;
      return pointToolId(name) === selectedToolId;
    }

    function toolName(toolId) {
      const entryLabels = TOOL_LABEL_OVERRIDES[currentEntry?.id];
      if (entryLabels?.[toolId]) return entryLabels[toolId];
      return TOOL_LABELS[toolId] || `道具${toolId}`;
    }

    function numericParts(name) {
      return (name.match(/\d+/g) || []).map(Number);
    }

    function stageNameSort(a, b) {
      return (numericParts(a)[0] || 0) - (numericParts(b)[0] || 0) || a.localeCompare(b);
    }

    function pointNameSort(a, b) {
      const aa = numericParts(a), bb = numericParts(b);
      return (aa[0] || 0) - (bb[0] || 0) || (aa[1] || 0) - (bb[1] || 0) || a.localeCompare(b);
    }

    function motionNameSort(a, b) {
      const aa = numericParts(a), bb = numericParts(b);
      return (aa[0] || 0) - (bb[0] || 0) || (aa[1] || 0) - (bb[1] || 0) || a.localeCompare(b);
    }

    function pointLabel(name, idx) {
      const kind = name.includes("_drag") ? "拖拽" : name.includes("gyro") ? "晃动" : "触摸";
      const hidden = name.includes("_hidden") ? "隐藏" : "";
      const toolId = pointToolId(name);
      return `${kind}${idx + 1}${toolId ? " · " + toolName(toolId) : ""}${hidden ? " · " + hidden : ""}`;
    }

    function animationDuration(name) {
      if (!player) return 2;
      const anims = player.skeleton?.data?.animations || [];
      const anim = anims.find(a => a.name === name);
      return anim ? anim.duration : 2;
    }

    function attachPlaybackListener(p) {
      p.animationState.addListener({
        start: (track) => {
          if (!track.animation || !currentEntry) return;
          if (datingAudio.debug) {
            document.documentElement.dataset.datingTrackHistory =
              `${document.documentElement.dataset.datingTrackHistory || ""}|${track.trackIndex}:${track.animation.name}`.slice(-700);
            if (track.trackIndex === 0) {
              document.documentElement.dataset.datingAnimation = track.animation.name;
              document.documentElement.dataset.datingAnimationHistory =
                `${document.documentElement.dataset.datingAnimationHistory || ""}|${track.animation.name}`.slice(-500);
            }
          }
          if (track.trackIndex !== 0) return;
          if (
            activeInteractionVoiceKey &&
            activeInteractionMotionNames.has(track.animation.name)
          ) {
            datingAudio.playInteractionVoice(currentEntry.id, activeInteractionVoiceKey, "motion");
          }
          datingAudio.playAnimation(currentEntry.id, track.animation.name);
        },
        complete: (track) => {
          // 循环动画(待机)每圈都触发 complete；overlay 互动进行中 restoringIdle=false,
          // 若不忽略会在循环边界重进 playIdle,其 setSlotsToSetupPose 在本帧 apply 之后
          // 执行,渲染出一帧 setup pose(多姿势组角色=重叠闪烁)。
          if (!track.animation || track.loop || track.trackIndex !== 0 || restoringIdle) return;
          // 拖住阶段:mix_1 播完停在末帧,等松手,不要自动回待机。
          if (dragHolding) return;
          const completed = track.animation.name;
          if (handleCardAnimationComplete(completed)) return;
          if (advanceLastMotion && completed !== advanceLastMotion) return;
          if (advanceTargetStage && completed === advanceLastMotion) {
            const target = advanceTargetStage;
            advanceTargetStage = null;
            advanceLastMotion = null;
            clearTimeout(advanceTimer);
            advanceTimer = null;
            enterStage(target);
            return;
          }
          if (completed === advanceLastMotion) {
            advanceLastMotion = null;
          }
          if (touchStopTimer) return;
          if (!advanceTargetStage) playIdle();
        },
      });
    }

    function buildList() {
      list.innerHTML = "";
      DATING.forEach(entry => {
        const b = document.createElement("button");
        b.className = "item";
        b.textContent = entry.label;
        b.title = `${entry.id} · ${entry.tag}`;
        b.dataset.id = entry.id;
        b.dataset.search = `${entry.id} ${entry.character} ${entry.tag}`.toLowerCase();
        b.onclick = () => loadDating(entry, b);
        list.appendChild(b);
      });
      document.getElementById("footer").innerHTML =
        `${DATING.length} 个有缘之客资源 · ${useCdn ? "CDN" : "本地 upstream"}<br>双击画面切换全屏 · 鼠标移到左缘呼出菜单`;
      const requested = new URLSearchParams(location.search).get("dating");
      const requestedId = requested
        ? (requested.startsWith("illust_dating") ? requested : `illust_dating${requested}`)
        : null;
      const initial = requestedId
        ? list.querySelector(`[data-id="${requestedId}"]`)
        : list.querySelector(".item");
      if (initial) initial.click();
    }

    search.addEventListener("input", () => {
      const q = search.value.trim().toLowerCase();
      list.querySelectorAll(".item").forEach(el => {
        el.classList.toggle("hidden", q && !el.dataset.search.includes(q));
      });
    });

    let showHotzones = false;
    function applyHotzoneVisibility() {
      hotzoneLayer.classList.toggle("show-hotzones", showHotzones);
      hotzoneToggle.classList.toggle("active", showHotzones);
      hotzoneToggle.textContent = showHotzones ? "隐藏热区" : "显示热区";
      hotzoneToggle.setAttribute("aria-pressed", String(showHotzones));
    }
    hotzoneToggle.addEventListener("click", () => {
      showHotzones = !showHotzones;
      applyHotzoneVisibility();
    });
    hotzoneLayer.addEventListener("pointerdown", beginHotzoneGestureArbitration, true);
    hotzoneLayer.addEventListener("click", suppressHandledHotzoneClick, true);
    applyHotzoneVisibility();

    const hotzone = document.getElementById("edge-hotzone");
    hotzone.addEventListener("mouseenter", () => drawer.classList.add("open"));
    drawer.addEventListener("mouseleave", () => drawer.classList.remove("open"));

    let idleTimer = null;
    document.addEventListener("mousemove", () => {
      document.body.classList.add("mouse-active");
      document.body.classList.remove("idle");
      clearTimeout(idleTimer);
      idleTimer = setTimeout(() => {
        document.body.classList.remove("mouse-active");
        if (!drawer.classList.contains("open")) document.body.classList.add("idle");
      }, 2500);
    });

    stage.addEventListener("dblclick", () => {
      if (document.fullscreenElement) document.exitFullscreen();
      else document.documentElement.requestFullscreen();
    });

    let hotzoneResizeFrame = null;
    function refreshHotzoneProjection() {
      cancelAnimationFrame(hotzoneResizeFrame);
      hotzoneResizeFrame = requestAnimationFrame(() => {
        if (currentEntry && stageModel) renderHotzones(currentPrefabActions());
      });
    }
    window.addEventListener("resize", refreshHotzoneProjection);
    document.addEventListener("fullscreenchange", refreshHotzoneProjection);

    buildList();
  </script>
</body>
</html>

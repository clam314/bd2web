      overflow: hidden;
    }
    body.idle { cursor: none; }

    #stage { position: fixed; inset: 0; }
    #stage .spine-player { background: transparent !important; }
    #hotzone-layer {
      position: fixed;
      inset: 0;
      z-index: 12;
      pointer-events: none;
    }
    .hotzone {
      position: absolute;
      min-width: 26px;
      min-height: 26px;
      border: 1px solid rgba(106, 166, 255, 0.62);
      border-radius: 6px;
      background: rgba(106, 166, 255, 0.12);
      box-shadow: 0 0 0 1px rgba(11, 13, 18, 0.18), inset 0 0 18px rgba(106, 166, 255, 0.12);
      color: #dceaff;
      cursor: pointer;
      pointer-events: auto;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      opacity: 0.72;
      transition: opacity 0.15s, background 0.15s, border-color 0.15s;
    }
    .hotzone:hover {
      opacity: 1;
      background: rgba(106, 166, 255, 0.2);
      border-color: rgba(152, 199, 255, 0.9);
    }
    .hotzone.holding {
      opacity: 1;
      background: rgba(106, 166, 255, 0.34);
      border-color: #dceaff;
    }
    .hotzone.gyro-zone {
      z-index: 0;
    }
    .hotzone.body-zone {
      z-index: 1;
    }
    .hotzone.card-zone {
      z-index: 2;
      border-color: rgba(255, 214, 112, 0.78);
      background: rgba(255, 196, 76, 0.16);
      color: #fff1bd;
    }
    .hotzone.card-result-zone {
      z-index: 3;
      border-color: rgba(255, 214, 112, 0.46);
      background: rgba(255, 196, 76, 0.08);
    }
    .hotzone::after {
      content: attr(data-label);
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      padding: 2px 6px;
      border-radius: 999px;
      background: rgba(11, 13, 18, 0.56);
      color: currentColor;
      font-size: 11px;
      line-height: 1.2;
      white-space: nowrap;
      pointer-events: none;
    }
    #hotzone-layer:not(.show-hotzones) .hotzone,
    #hotzone-layer:not(.show-hotzones) .hotzone:hover,
    #hotzone-layer:not(.show-hotzones) .hotzone.holding {
      border-color: transparent;
      background: transparent;
      box-shadow: none;
      color: transparent;
      cursor: default;
      opacity: 1;
    }
    #hotzone-layer:not(.show-hotzones) .hotzone::after {
      display: none;
    }

    #edge-hotzone {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: 16px;
      z-index: 19;
    }
    #drawer {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: 320px;
      background: var(--panel);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-right: 1px solid var(--line);
      transform: translateX(-100%);

      z-index: 20;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #handle {

      border-radius: 0 4px 4px 0;
      background: rgba(255, 255, 255, 0.28);
      z-index: 18;
      opacity: 0;
      transition: opacity 0.4s;
      pointer-events: none;

    #drawer.open ~ #handle { opacity: 0; }

    function makeViewport(entry) {
      const base = PREFAB_VIEWPORTS[entry.id] || DEFAULT_VIEWPORT;
      if (base.x !== undefined) return base;
      if (viewMode === "fit") return GAME_SCREEN_VIEWPORT;
      const modeScale = viewMode === "fill" ? (base.scale || 0.5) * 1.45 : 1;
      const padding = viewMode === "fill" ? 1.04 : 1.08;
      const width = Math.round(base.width * modeScale * padding);
      const height = Math.round(base.height * modeScale * padding);
      return {
        x: Math.round(base.cx - width / 2),
        y: Math.round(base.cy - height / 2),
        width,
        height,
      };
    }

    function buildStageModel(p) {
      const names = p.skeleton.data.animations.map(a => a.name);
      const faces = names.filter(n => n.startsWith("_"));
      const bodies = names.filter(n => !n.startsWith("_"));
      const defaultMotions = currentEntry ? DEFAULT_STAGE_MOTIONS[currentEntry.id] : null;
      const stages = new Map();
      const ensureStage = (stageNo) => {
        if (!stages.has(stageNo)) {
          stages.set(stageNo, { idles: [], points: [], motions: [], mixes: [] });
        }
        return stages.get(stageNo);
      };

      bodies.forEach(name => {
        let m = name.match(/^idle(\d+)$/);
        if (m) { ensureStage(Number(m[1])).idles.push(name); return; }
        m = name.match(/^point(\d+)_/);
        if (m) { ensureStage(Number(m[1])).points.push(name); return; }
        m = name.match(/^motion(\d+)_/);
        if (m) { ensureStage(Number(m[1])).motions.push(name); return; }
        m = name.match(/^mix(\d+)_/);
        if (m) { ensureStage(Number(m[1])).mixes.push(name); return; }
        if (name === "loop" && !defaultMotions) ensureStage(1).idles.push(name);
      });
      if (defaultMotions) {
        Object.entries(defaultMotions).forEach(([stageNo, motion]) => {
          const stage = ensureStage(Number(stageNo));
          if (bodies.includes(motion)) stage.idles.unshift(motion);
        });
      }
      const meta = currentEntry ? INTERACTION_POINTS[currentEntry.id] : null;
      if (meta) Object.keys(meta).forEach(stageNo => ensureStage(Number(stageNo)));

      if (!stages.size) {
        const base = bodies.find(n => /idle|loop/i.test(n)) || bodies[0];
        stages.set(1, { idles: base ? [base] : [], points: bodies.filter(n => n !== base), motions: [], mixes: [] });
      }

      const stageIds = [...stages.keys()].sort((a, b) => a - b);
      stageIds.forEach(id => {
        const s = stages.get(id);
        s.idles = uniq(s.idles).sort(stageNameSort);
        s.points = uniq(s.points).sort(pointNameSort);
        s.motions = uniq(s.motions).sort(motionNameSort);
        s.mixes = uniq(s.mixes).sort(motionNameSort);
      });

      stageModel = {
        stages,
        stageIds,
        faces,
        fallbackIdle: bodies.find(n => /idle|loop/i.test(n)) || bodies[0],
        pointMeta: meta || {},
      };
      currentStage = stageIds[0] || 1;
    }

    function advanceStage() {
      if (!player || !stageModel) return;
      const stage = stageModel.stages.get(currentStage);
      const seq = stage.motions.length ? stage.motions : stage.mixes;
      const next = nextStageId();
      if (!seq.length) {
        if (next) enterStage(next);
        return;
      }
      try {
        restoringIdle = false;
        advanceTargetStage = next || null;
        advanceLastMotion = seq[seq.length - 1] || null;
        player.animationState.data.defaultMix = 0.25;
        player.setAnimation(seq[0], false);
        seq.slice(1).forEach(name => player.animationState.addAnimation(0, name, false, 0));
        player.play();
        animList.querySelectorAll(".body-anim").forEach(x => x.classList.remove("active"));
        clearTimeout(advanceTimer);
        if (next) {
          const duration = seq.reduce((sum, name) => sum + animationDuration(name), 0);
          const delay = Math.min(7000, Math.max(1600, duration * 1000 + 300));
          advanceTimer = setTimeout(() => {
            if (advanceTargetStage === next) enterStage(next);
          }, delay);
        }
      } catch (e) { showError("播放阶段演出失败：" + e.message); }
    }

        clearTimeout(advanceTimer);
        advanceTimer = null;
        player.animationState.data.defaultMix = 0.2;
        const action = prefabPointAction(name);
        const sequence = action ? prefabActionSequence(action) : [];
        if (sequence.length) {
          const targetStage = resolveActionNextStage(action);
          advanceTargetStage = targetStage;
          advanceLastMotion = sequence[sequence.length - 1] || null;
          player.setAnimation(sequence[0], false);
          sequence.slice(1).forEach(anim => player.animationState.addAnimation(0, anim, false, 0));
          if (advanceTargetStage) {
            const duration = sequence.reduce((sum, anim) => sum + animationDuration(anim), 0);
            const delay = Math.min(9000, Math.max(1200, duration * 1000 + 300));
            advanceTimer = setTimeout(() => {
              if (advanceTargetStage === targetStage) enterStage(targetStage);
            }, delay);
          }
        } else {
          player.setAnimation(name, false);
        }
        player.play();
        animList.querySelectorAll(".body-anim").forEach(x => x.classList.remove("active"));
        btn.classList.add("active");
      } catch (e) { showError("播放互动失败：" + e.message); }
    }

    function playPrefabAction(action, btn) {
      if (!player || !action) return;
      try {
        const targetStage = resolveActionNextStage(action);
        restoringIdle = false;
        advanceTargetStage = targetStage;
        advanceLastMotion = null;
        clearTimeout(advanceTimer);
        advanceTimer = null;
        player.animationState.data.defaultMix = 0.2;
        const sequence = prefabActionSequence(action);
        if (!sequence.length) {
          showError("这个 prefab 互动没有可播放的 Spine 动画。");
          return;
        }
        advanceLastMotion = sequence[sequence.length - 1];
        player.setAnimation(sequence[0], false);
        sequence.slice(1).forEach(anim => player.animationState.addAnimation(0, anim, false, 0));
        player.play();
        animList.querySelectorAll(".body-anim").forEach(x => x.classList.remove("active"));
        if (btn) btn.classList.add("active");
        if (advanceTargetStage) {
          const duration = sequence.reduce((sum, anim) => sum + animationDuration(anim), 0);
          const delay = Math.min(9000, Math.max(1200, duration * 1000 + 300));
          advanceTimer = setTimeout(() => {
            if (advanceTargetStage === targetStage) enterStage(targetStage);
          }, delay);
        }
      } catch (e) { showError("播放 prefab 互动失败：" + e.message); }
    }

    function prefabActionSequence(action) {
      const destinationIndex = Number.isInteger(action.destinationIndex) ? action.destinationIndex : 0;
      const motions = action.destinationIndexed
        ? (action.motions || []).slice(destinationIndex, destinationIndex + 1)
        : (action.motions || []);
      return [...(action.mix || []), ...motions].filter(animationExists);
    }

    function playIdle() {
      if (!player || !stageModel) return;
      const idle = pickIdle(stageModel.stages.get(currentStage));
      if (!idle) return;
      try {
        resetCardGame(true);
        restoringIdle = true;
        advanceTargetStage = null;
        advanceLastMotion = null;
        clearTimeout(advanceTimer);
        advanceTimer = null;
        player.animationState.data.defaultMix = 0.25;
        applyStageSkin(currentStage);
        player.setAnimation(idle, true);
        player.play();
        animList.querySelectorAll(".body-anim").forEach(x => x.classList.remove("active"));
        const idleBtn = [...animList.querySelectorAll(".body-anim")].find(b => b.title === idle);
        if (idleBtn) idleBtn.classList.add("active");
      } catch (e) { showError("播放待机失败：" + e.message); }
    }

    function applyStageSkin(stageNo) {
      const stageSkins = currentEntry && STAGE_TOOL_SKINS[currentEntry.id]?.[stageNo];
      const skinName = stageSkins && (stageSkins[selectedToolId] || stageSkins[0] || Object.values(stageSkins)[0]);
      if (!skinName || !player?.skeleton?.data?.findSkin(skinName)) return;
      player.skeleton.setSkinByName(skinName);
      player.skeleton.setSlotsToSetupPose();
      player.animationState.apply(player.skeleton);
    }

    function pickIdle(stage) {
      if (!stage) return stageModel?.fallbackIdle;
      return stage.idles[0] || stageModel.fallbackIdle;
    }

    function nextStageId() {
      const idx = stageModel.stageIds.indexOf(currentStage);
      return idx >= 0 ? stageModel.stageIds[idx + 1] : null;
    }

    function uniq(values) {
      return [...new Set(values)];
    }

    function getStageTools(stage) {
      const fromSkins = currentEntry ? Object.keys(STAGE_TOOL_SKINS[currentEntry.id]?.[currentStage] || {}).map(Number) : [];
      const fromPoints = (stage?.points || []).map(pointToolId);
      const fromPrefab = currentEntry ? Object.keys(PREFAB_POINT_ACTIONS[currentEntry.id] || {})
        .map(key => key.split("_").map(Number))
        .filter(([stageNo]) => stageNo === currentStage)
        .map(([, , toolId]) => toolId) : [];
      return uniq([...fromSkins, ...fromPoints, ...fromPrefab]).filter(n => Number.isFinite(n)).sort((a, b) => a - b);
    }

    function pointToolId(name) {
      const m = name.match(/tool(\d+)/);
      return m ? Number(m[1]) : 0;
    }

    function prefabPointAction(name) {
      if (!currentEntry) return null;
      const m = name.match(/^point(\d+)_(\d+)/);
      if (!m) return null;
      const key = `${Number(m[1])}_${Number(m[2])}_${pointToolId(name)}`;
      return PREFAB_POINT_ACTIONS[currentEntry.id]?.[key] || null;
    }

    function currentPrefabActions() {
      const actions = currentEntry ? PREFAB_POINT_ACTIONS[currentEntry.id] : null;
      if (!actions) return [];
      return Object.entries(actions)
        .map(([key, action]) => {
          const [stageNo, pointId, toolId] = key.split("_").map(Number);
          return { key, action, stageNo, pointId, toolId };
        })
        .filter(item => item.stageNo === currentStage)
        .filter(item => selectedToolId === null || item.toolId === selectedToolId)
        .sort((a, b) => a.pointId - b.pointId);
    }

    function isDating18CardStage() {
      return currentEntry?.id === "illust_dating18" && currentStage === 6;
    }

    function clearCardGameTimers() {
      cardGameTimers.forEach(clearTimeout);
      cardGameTimers = [];
    }

    function resetCardGame(render) {
      clearCardGameTimers();
      cardGameState = isDating18CardStage() ? { phase: "ready" } : null;
      if (render && currentEntry && stageModel) renderHotzones(currentPrefabActions());
    }

    function scheduleCardGame(delay, callback) {
      const timer = setTimeout(() => {
        cardGameTimers = cardGameTimers.filter(item => item !== timer);
        callback();
      }, delay);
      cardGameTimers.push(timer);
    }

    function playCardAnimation(name, completeBehavior = "none") {
      if (!player || !animationExists(name)) return false;
      restoringIdle = false;
      advanceTargetStage = null;
      advanceLastMotion = null;
      clearTimeout(advanceTimer);
      advanceTimer = null;
      if (cardGameState) {
        cardGameState.animation = name;
        cardGameState.completeBehavior = completeBehavior;
      }
      player.animationState.data.defaultMix = 0.2;
      player.setAnimation(name, false);
      player.play();
      animList.querySelectorAll(".body-anim").forEach(x => x.classList.remove("active"));
      return true;
    }

    function playCardDeal() {
      if (!isDating18CardStage() || !player) return;
      clearCardGameTimers();
      const handIndex = Math.floor(Math.random() * DATING18_CARD_GAME.hands.length);
      const hand = DATING18_CARD_GAME.hands[handIndex];
      cardGameState = { phase: "dealing", handIndex };
      renderHotzones(currentPrefabActions());
      if (!playCardAnimation(hand.deal, "idle-if-resolving")) {
        resetCardGame(true);
        return;
      }
      const [openAt, closeAt] = DATING18_CARD_GAME.handWindow;
      scheduleCardGame(openAt, () => {
        if (cardGameState?.phase !== "dealing" || cardGameState.handIndex !== handIndex) return;
        cardGameState.phase = "hand";
        renderHotzones(currentPrefabActions());
      });
      scheduleCardGame(closeAt, () => {
        if (cardGameState?.phase !== "hand" || cardGameState.handIndex !== handIndex) return;
        cardGameState.phase = "resolving";
        renderHotzones(currentPrefabActions());
      });
    }

    function playCardChoice(pointId) {
      if (cardGameState?.phase !== "hand") return;
      const hand = DATING18_CARD_GAME.hands[cardGameState.handIndex];
      if (!hand) return;
      clearCardGameTimers();
      const outcome = DATING18_CARD_GAME.matchingSuit.includes(pointId)
        ? "match"
        : DATING18_CARD_GAME.specialClubs.includes(pointId) ? "club" : "mismatch";
      cardGameState = { phase: "resolving", handIndex: cardGameState.handIndex, pointId, outcome };
      renderHotzones(currentPrefabActions());
      const resultPoint = pointId === hand.redeal ? null : DATING18_CARD_GAME.results[pointId];
      const completeBehavior = resultPoint ? "hold" : "idle";
      if (!playCardAnimation(`mix6_${pointId}_1`, completeBehavior)) {
        resetCardGame(true);
        return;
      }
      if (pointId === hand.redeal) return;
      if (!resultPoint) return;
      const openAt = DATING18_CARD_GAME.resultOpenAt[resultPoint];
      scheduleCardGame(openAt, () => {
        if (cardGameState?.pointId !== pointId) return;
        cardGameState.phase = "result";
        cardGameState.resultPoint = resultPoint;
        renderHotzones(currentPrefabActions());
      });
    }

    function playCardResult(resultPoint) {
      if (cardGameState?.phase !== "result" || cardGameState.resultPoint !== resultPoint) return;
      clearCardGameTimers();
      cardGameState.phase = "special";
      renderHotzones(currentPrefabActions());
      if (!playCardAnimation(`mix6_${resultPoint}_1`, "idle")) {
        resetCardGame(true);
        return;
      }
      const [openAt, closeAt] = DATING18_CARD_GAME.finishWindows[resultPoint];
      scheduleCardGame(openAt, () => {
        if (cardGameState?.phase !== "special" || cardGameState.resultPoint !== resultPoint) return;
        cardGameState.phase = "finish";
        renderHotzones(currentPrefabActions());
      });
      scheduleCardGame(closeAt, () => {
        if (cardGameState?.phase !== "finish" || cardGameState.resultPoint !== resultPoint) return;
        cardGameState.phase = "special";
        renderHotzones(currentPrefabActions());
      });
    }

    function playCardFinish() {
      if (cardGameState?.phase !== "finish") return;
      clearCardGameTimers();
      cardGameState.phase = "resolving";
      renderHotzones(currentPrefabActions());
      if (!playCardAnimation("mix6_34_1", "idle")) resetCardGame(true);
    }

    function handleCardAnimationComplete(completed) {
      if (!cardGameState || cardGameState.phase === "ready") return false;
      if (cardGameState.animation !== completed) return true;
      const behavior = cardGameState.completeBehavior;
      cardGameState.animation = null;
      cardGameState.completeBehavior = "none";
      if (behavior === "idle" || (behavior === "idle-if-resolving" && cardGameState.phase === "resolving")) {
        playIdle();
      }
      return true;
    }

    function renderCardGameHotzones() {
      if (!isDating18CardStage() || !cardGameState || cardGameState.phase === "ready") return false;
      if (cardGameState.phase === "hand") {
        const hand = DATING18_CARD_GAME.hands[cardGameState.handIndex];
        const points = [hand.redeal, ...hand.cards];
        points.forEach((pointId, index) => {
          const [cx, cy] = hand.centers[index];
          const zone = { x: cx - 43.75, y: cy - 43.75, width: 87.5, height: 87.5 };
          const box = hotzoneToScreenBox(zone);
          if (!box) return;
          const label = index === 0
            ? "重发"
            : DATING18_CARD_GAME.matchingSuit.includes(pointId)
              ? "同花色"
              : DATING18_CARD_GAME.specialClubs.includes(pointId) ? "梅花" : "其他花色";
          const b = makeHotzoneButton(box, label, `牌局互动 · point6_${pointId}`, "card-zone");
          b.onclick = () => playCardChoice(pointId);
          hotzoneLayer.appendChild(b);
        });
      } else if (cardGameState.phase === "result") {
        const box = fullCanvasHotzoneBox();
        const outcome = cardGameState.outcome === "match" ? "同花色" : "不同花色";
        const b = makeHotzoneButton(box, `${outcome} · 再点一次画面`, `牌局结果 · point6_${cardGameState.resultPoint}`, "card-result-zone");
        b.onclick = () => playCardResult(cardGameState.resultPoint);
        hotzoneLayer.appendChild(b);
      } else if (cardGameState.phase === "finish") {
        const box = fullCanvasHotzoneBox();
        const b = makeHotzoneButton(box, "结束", "牌局结束 · point6_34", "card-result-zone");
        b.onclick = () => playCardFinish();
        hotzoneLayer.appendChild(b);
      }
      return true;
    }

    function renderHotzones(prefabActions) {
      hotzoneLayer.innerHTML = "";
      activeGyroAction = null;
      gyroBaseline = null;
      if (!currentEntry) return;
      if (renderCardGameHotzones()) return;
      if (!prefabActions.length) return;
      prefabActions.forEach((item, idx) => {
        const zone = PREFAB_HOTZONES[currentEntry.id]?.[item.key];
        const box = zone && hotzoneToScreenBox(zone);
        if (!box) return;
        const b = makeHotzoneButton(
          box,
          hotzoneLabel(item.action, idx),
          `${item.action.label || prefabActionLabel(item.action, idx)} · ${item.key} · ${zone.source}`,
          item.action.kind === "gyro" ? "gyro-zone" : item.action.kind === "card" ? "card-zone" : "body-zone",
        );
        if (item.action.longPress) {
          b.addEventListener("pointerdown", event => beginLongPress(item.action, b, event));
          b.addEventListener("pointerup", event => cancelLongPress(true, event));
          b.addEventListener("pointercancel", event => cancelLongPress(true, event));
          b.addEventListener("click", event => event.preventDefault());
        } else if (item.action.gyro?.actionType === 1) {
          b.dataset.label = "左右倾斜";
          activeGyroAction = item.action;
          b.addEventListener("pointerdown", event => beginGyroDrag(item.action, b, event));
          b.addEventListener("pointermove", event => moveGyroDrag(event));
          b.addEventListener("pointerup", event => cancelGyroDrag(event));
          b.addEventListener("pointercancel", event => cancelGyroDrag(event));
          b.addEventListener("click", event => event.preventDefault());
        } else if (item.action.cardGame === "deal") {
          b.onclick = () => playCardDeal();
        } else {
          b.onclick = () => playPrefabAction(item.action, null);
        }
        hotzoneLayer.appendChild(b);
      });
    }

    function makeHotzoneButton(box, label, title, className) {
      const b = document.createElement("button");
      b.type = "button";
      b.className = `hotzone ${className}`;
      b.dataset.label = label;
      b.title = title;
      b.style.left = box.left + "%";
      b.style.top = box.top + "%";
      b.style.width = box.width + "%";
      b.style.height = box.height + "%";
      return b;
    }

    function beginGyroDrag(action, element, event) {
      if (!player || activeGyroDrag) return;
      event.preventDefault();
      event.stopPropagation();
      try {
        element.setPointerCapture(event.pointerId);
      } catch (e) { /* pointer capture is optional */ }
      element.classList.add("holding");
      activeGyroDrag = {
        action,
        element,
        pointerId: event.pointerId,
        startX: event.clientX,
        threshold: Math.max(72, stage.clientWidth * action.gyro.moveThreshold / 100),
      };
    }

    function moveGyroDrag(event) {
      const drag = activeGyroDrag;
      if (!drag || event.pointerId !== drag.pointerId) return;
      const deltaX = event.clientX - drag.startX;
      if (Math.abs(deltaX) < drag.threshold) return;
      activeGyroDrag = null;
      drag.element.classList.remove("holding");
      try {
        if (drag.element.hasPointerCapture(drag.pointerId)) {
          drag.element.releasePointerCapture(drag.pointerId);
        }
      } catch (e) { /* element may already be detached */ }
      playGyroAction(drag.action, deltaX < 0 ? 0 : 1);
    }

    function cancelGyroDrag(event) {
      const drag = activeGyroDrag;
      if (!drag) return;
      if (event && event.pointerId !== drag.pointerId) return;
      activeGyroDrag = null;
      drag.element.classList.remove("holding");
      try {
        if (drag.element.hasPointerCapture(drag.pointerId)) {
          drag.element.releasePointerCapture(drag.pointerId);
        }
      } catch (e) { /* element may already be detached */ }
    }

    function playGyroAction(action, destinationIndex) {
      if (!action) return;
      action.destinationIndex = destinationIndex;
      playPrefabAction(action, null);
    }

    async function enableDeviceOrientation() {
      if (deviceOrientationEnabled || typeof DeviceOrientationEvent === "undefined") return;
      try {
        if (typeof DeviceOrientationEvent.requestPermission === "function") {
          const result = await DeviceOrientationEvent.requestPermission();
          if (result !== "granted") return;
        }
        window.addEventListener("deviceorientation", handleDeviceOrientation);
        deviceOrientationEnabled = true;
        gyroBaseline = null;
      } catch (e) {
        showError("浏览器未允许设备方向感应，可改用画面左右拖动。");
      }
    }

    function handleDeviceOrientation(event) {
      if (!activeGyroAction || selectedToolId !== 14 || advanceTargetStage) return;
      const angle = screen.orientation?.angle ?? window.orientation ?? 0;
      const value = Math.abs(angle) === 90 ? event.beta : event.gamma;
      if (!Number.isFinite(value)) return;
      if (gyroBaseline === null) {
        gyroBaseline = value;
        return;
      }
      const delta = value - gyroBaseline;
      if (Math.abs(delta) < activeGyroAction.gyro.moveThreshold) return;
      const action = activeGyroAction;
      gyroBaseline = value;
      activeGyroAction = null;
      playGyroAction(action, delta < 0 ? 0 : 1);
    }

    function beginLongPress(action, element, event) {
      if (!player || activeLongPress) return;
      event.preventDefault();
      event.stopPropagation();
      try {
        element.setPointerCapture(event.pointerId);
      } catch (e) { /* pointer capture is optional */ }
      restoringIdle = true;
      advanceTargetStage = null;
      advanceLastMotion = null;
      clearTimeout(advanceTimer);
      advanceTimer = null;
      const start = (action.mix || []).find(animationExists);
      const loop = action.longPress.loop;
      if (start) {
        player.setAnimation(start, false);
        if (animationExists(loop)) player.animationState.addAnimation(0, loop, true, 0);
        player.play();
      }
      element.classList.add("holding");
      const press = { action, element, pointerId: event.pointerId, timer: null };
      press.timer = setTimeout(() => completeLongPress(press), action.longPress.threshold * 1000);
      activeLongPress = press;
    }

    function completeLongPress(press) {
      if (activeLongPress !== press || !player) return;
      activeLongPress = null;
      press.element.classList.remove("holding");
      const action = press.action;
      const success = animationExists(action.longPress.success)
        ? action.longPress.success
        : (action.motions || []).find(animationExists);
      if (!success) {
        restoringIdle = false;
        playIdle();
        return;
      }
      const targetStage = resolveActionNextStage(action);
      restoringIdle = false;
      advanceTargetStage = targetStage;
      advanceLastMotion = success;
      player.animationState.data.defaultMix = 0.2;
      player.setAnimation(success, false);
      player.play();
      if (targetStage) {
        const delay = Math.min(9000, Math.max(1200, animationDuration(success) * 1000 + 300));
        advanceTimer = setTimeout(() => {
          if (advanceTargetStage === targetStage) enterStage(targetStage);
        }, delay);
      }
    }

    function cancelLongPress(playFailure, event) {
      const press = activeLongPress;
      if (!press) return;
      if (event && event.pointerId !== press.pointerId) return;
      clearTimeout(press.timer);
      activeLongPress = null;
      press.element.classList.remove("holding");
      try {
        if (press.element.hasPointerCapture(press.pointerId)) {
          press.element.releasePointerCapture(press.pointerId);
        }
      } catch (e) { /* element may already be detached */ }
      if (!playFailure || !player) {
        restoringIdle = false;
        return;
      }
      if (press.action.longPress.actionType === 1) {
        restoringIdle = false;
        const shortAction = {
          ...press.action,
          mix: (press.action.mix || []).slice(0, 1),
          motions: [],
          nextStage: null,
          longPress: null,
        };
        playPrefabAction(shortAction, null);
        return;
      }
      const fail = press.action.longPress.fail;
      restoringIdle = false;
      advanceTargetStage = null;
      advanceLastMotion = null;
      if (animationExists(fail)) {
        player.animationState.data.defaultMix = 0.2;
        player.setAnimation(fail, false);
        player.play();
      } else {
        playIdle();
      }
    }

    function fullCanvasHotzoneBox() {
      const canvasRect = player?.canvas?.getBoundingClientRect();
      const layerRect = hotzoneLayer.getBoundingClientRect();
      if (!canvasRect || !layerRect.width || !layerRect.height) return null;
      return {
        left: roundPct((canvasRect.left - layerRect.left) / layerRect.width * 100),
        top: roundPct((canvasRect.top - layerRect.top) / layerRect.height * 100),
        width: roundPct(canvasRect.width / layerRect.width * 100),
        height: roundPct(canvasRect.height / layerRect.height * 100),
      };
    }

    function hotzoneToScreenBox(zone) {
      const canvas = player?.canvas;
      const viewport = player?.viewport;
      if (!canvas || !viewport || !currentEntry) return null;
      const canvasRect = canvas.getBoundingClientRect();
      const layerRect = hotzoneLayer.getBoundingClientRect();
      if (!canvasRect.width || !canvasRect.height || !layerRect.width || !layerRect.height) return null;

      const scale = HOTZONE_WORLD_SCALES[currentEntry.id] || 1;
      const worldLeft = zone.x * scale;
      const worldRight = (zone.x + zone.width) * scale;
      const worldBottom = zone.y * scale;
      const worldTop = (zone.y + zone.height) * scale;
      const backingScaleX = canvas.width / canvasRect.width;
      const backingScaleY = canvas.height / canvasRect.height;
      const zoom = canvas.height / canvas.width > viewport.height / viewport.width
        ? viewport.width / canvas.width
        : viewport.height / canvas.height;
      const cameraX = viewport.x + viewport.width / 2;
      const cameraY = viewport.y + viewport.height / 2;
      const projectX = x => canvasRect.left + (canvas.width / 2 + (x - cameraX) / zoom) / backingScaleX;
      const projectY = y => canvasRect.top + (canvas.height / 2 - (y - cameraY) / zoom) / backingScaleY;

      const leftPx = Math.max(canvasRect.left, projectX(worldLeft));
      const rightPx = Math.min(canvasRect.right, projectX(worldRight));
      const topPx = Math.max(canvasRect.top, projectY(worldTop));
      const bottomPx = Math.min(canvasRect.bottom, projectY(worldBottom));
      if (rightPx <= leftPx || bottomPx <= topPx) return null;
      const width = (rightPx - leftPx) / layerRect.width * 100;
      const height = (bottomPx - topPx) / layerRect.height * 100;
      if (width < 1 || height < 1) return null;
      return {
        left: roundPct((leftPx - layerRect.left) / layerRect.width * 100),
        top: roundPct((topPx - layerRect.top) / layerRect.height * 100),
        width: roundPct(width),
        height: roundPct(height),
      };
    }

    function hotzoneLabel(action, idx) {
      if (action.label) return action.label.split(/[：:]/)[0].replace(/^画面/, "");
      if (action.kind === "drag") return "拖";
      if (action.kind === "gyro") return "晃";
      if (action.gauge) return "计";
      return String(idx + 1);
    }

    function roundPct(value) {
      return Math.round(value * 1000) / 1000;
    }

    function resolveActionNextStage(action) {
      if (!action?.nextStage) return null;
      if (action.nextStage === "next") return nextStageId();
      return action.nextStage;
    }

    function prefabActionLabel(action, idx) {
      const kind = action.kind === "drag" ? "拖拽" : action.kind === "gyro" ? "晃动" : "触摸";
      const target = resolveActionNextStage(action);
      const next = target ? ` -> 阶段${target}` : "";
      const gauge = action.gauge ? "计量" : "";
      const clicks = action.clickMax ? `${action.clickMax}击` : "";
      return `${action.label || `${kind}${idx + 1}`}${gauge}${clicks}${next}`;
    }

    function animationExists(name) {
      return !!player?.skeleton?.data?.animations?.some(anim => anim.name === name);
    }

    function isPointVisibleForTool(name) {
      if (selectedToolId === null) return true;
      return pointToolId(name) === selectedToolId;
    }

    function toolName(toolId) {
      return TOOL_LABELS[toolId] || `道具${toolId}`;
    }

    function numericParts(name) {
      return (name.match(/\d+/g) || []).map(Number);
    }

    function stageNameSort(a, b) {
      return (numericParts(a)[0] || 0) - (numericParts(b)[0] || 0) || a.localeCompare(b);
    }

    function pointNameSort(a, b) {
      const aa = numericParts(a), bb = numericParts(b);
      return (aa[0] || 0) - (bb[0] || 0) || (aa[1] || 0) - (bb[1] || 0) || a.localeCompare(b);
    }

    function motionNameSort(a, b) {
      const aa = numericParts(a), bb = numericParts(b);
      return (aa[0] || 0) - (bb[0] || 0) || (aa[1] || 0) - (bb[1] || 0) || a.localeCompare(b);
    }

    function pointLabel(name, idx) {
      const kind = name.includes("_drag") ? "拖拽" : name.includes("gyro") ? "晃动" : "触摸";
      const hidden = name.includes("_hidden") ? "隐藏" : "";
      const toolId = pointToolId(name);
      return `${kind}${idx + 1}${toolId ? " · " + toolName(toolId) : ""}${hidden ? " · " + hidden : ""}`;
    }

    function animationDuration(name) {
      if (!player) return 2;
      const anims = player.skeleton?.data?.animations || [];
      const anim = anims.find(a => a.name === name);
      return anim?.duration || 2;
    }

    function attachPlaybackListener(p) {
      p.animationState.addListener({
        complete: (track) => {
          if (!track.animation || track.trackIndex !== 0 || restoringIdle) return;
          const completed = track.animation.name;
          if (handleCardAnimationComplete(completed)) return;
          if (advanceTargetStage && completed === advanceLastMotion) {
            const target = advanceTargetStage;
            advanceTargetStage = null;
            advanceLastMotion = null;
            clearTimeout(advanceTimer);
            advanceTimer = null;
            enterStage(target);
            return;
          }
          if (!advanceTargetStage) playIdle();
        },
      });
    }

    function buildList() {
      list.innerHTML = "";
      DATING.forEach(entry => {
        const b = document.createElement("button");
        b.className = "item";
        b.textContent = entry.label;
        b.title = `${entry.id} · ${entry.tag}`;
        b.dataset.search = `${entry.id} ${entry.character} ${entry.tag}`.toLowerCase();
        b.onclick = () => loadDating(entry, b);
        list.appendChild(b);
      });
      document.getElementById("footer").innerHTML =
        `${DATING.length} 个心契资源 · ${useCdn ? "CDN" : "本地 upstream"}<br>双击画面切换全屏 · 鼠标移到左缘呼出菜单`;
      const first = list.querySelector(".item");
      if (first) first.click();
    }

    search.addEventListener("input", () => {
      const q = search.value.trim().toLowerCase();
      list.querySelectorAll(".item").forEach(el => {
        el.classList.toggle("hidden", q && !el.dataset.search.includes(q));
      });
    });

    let showHotzones = false;
    function applyHotzoneVisibility() {
      hotzoneLayer.classList.toggle("show-hotzones", showHotzones);
      hotzoneToggle.classList.toggle("active", showHotzones);
      hotzoneToggle.textContent = showHotzones ? "隐藏热区" : "显示热区";
      hotzoneToggle.setAttribute("aria-pressed", String(showHotzones));
    }
    hotzoneToggle.addEventListener("click", () => {
      showHotzones = !showHotzones;
      applyHotzoneVisibility();
    });
    applyHotzoneVisibility();

    const hotzone = document.getElementById("edge-hotzone");
    hotzone.addEventListener("mouseenter", () => drawer.classList.add("open"));
    drawer.addEventListener("mouseleave", () => drawer.classList.remove("open"));

    let idleTimer = null;
    document.addEventListener("mousemove", () => {
      document.body.classList.add("mouse-active");
      document.body.classList.remove("idle");
      clearTimeout(idleTimer);
      idleTimer = setTimeout(() => {
        document.body.classList.remove("mouse-active");
        if (!drawer.classList.contains("open")) document.body.classList.add("idle");
      }, 2500);
    });

    stage.addEventListener("dblclick", () => {
      if (document.fullscreenElement) document.exitFullscreen();
      else document.documentElement.requestFullscreen();
    });

    let hotzoneResizeFrame = null;
    function refreshHotzoneProjection() {
      cancelAnimationFrame(hotzoneResizeFrame);
      hotzoneResizeFrame = requestAnimationFrame(() => {
        if (currentEntry && stageModel) renderHotzones(currentPrefabActions());
      });
    }
    window.addEventListener("resize", refreshHotzoneProjection);
    document.addEventListener("fullscreenchange", refreshHotzoneProjection);

    buildList();
  </script>
</body>
</html>

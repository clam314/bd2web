<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BD2 Spine 动画播放器</title>

  <!-- Spine 官方 Web Player（本地化，零外网依赖；素材为 4.1.x 导出需用 4.1 运行时） -->
  <link rel="stylesheet" href="./vendor/spine-player-4.1.56.css" />
  <script src="./vendor/spine-player-4.1.56.js"></script>

  <style>
    :root {
      --bg: #0b0d12;
      --panel: rgba(22, 25, 33, 0.92);
      --text: #e6e8ee;
      --muted: #8b90a0;
      --accent: #6aa6ff;
      --line: rgba(255, 255, 255, 0.07);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      overflow: hidden;
    }
    body.idle { cursor: none; }

    /* ── 全屏舞台 ── */
    /* 默认（立绘形态）铺满浏览器；cutscene 形态下用 JS 锁成游戏窗口 1600:720 比例
       并居中（aspect-ratio 用 JS 算尺寸而不是 CSS，以兼容老浏览器），多余区域留黑边。
       这样人物取景 + 背景图与游戏完全对齐，不会因浏览器宽高比走样。 */
    #stage { position: fixed; inset: 0; background: #000; overflow: hidden; }
    #stage .spine-player { background: transparent !important; }
    /* 真实运镜：每帧 RAF 直接写 transform（translate），#stage 自己 overflow:hidden
       把溢出剪掉，letterbox 黑边不会被运镜越界覆盖。RAF 高频写不要 transition，否则会糊。*/
    #stage > * { width: 100%; height: 100%; transform-origin: 50% 50%; }
    /* cutscene 多 SkeletonGraphic 实例叠播：每层一个 .cut-layer，绝对定位铺满 stage、
       DOM 顺序自然给 z-order（先 append 的在底）。鼠标事件穿透。详见 AGENTS.md。 */
    .cut-layer { position: absolute; inset: 0; pointer-events: none; }

    /* 技能动画的游戏化后期：两套调色对应游戏 Timeline 上的 PostProcessVolume 与
       PostProcessVolume 2 切换（ACES 近似 + 对比/饱和/提亮，参数取自游戏 APK）。
       默认 "main"；当 Timeline 切到备用 vol 时 .cutscene-fx-alt 生效。 */
    body.cutscene-fx #stage { filter: brightness(1.06) contrast(1.16) saturate(1.28); }
    body.cutscene-fx.cutscene-fx-alt #stage { filter: brightness(0.92) contrast(1.05) saturate(0.85); }
    /* 暗角层，仅 cutscene 显示；定位跟舞台一致，靠 JS 同步 inset */
    #vignette {
      position: fixed; z-index: 5; pointer-events: none; display: none;
      background: radial-gradient(ellipse 75% 70% at 50% 42%, transparent 55%, rgba(0,0,0,0.55) 100%);
    }
    body.cutscene-fx #vignette { display: block; }

    /* ── 左侧滑出抽屉 ── */
    #drawer {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: 300px;
      background: var(--panel);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-right: 1px solid var(--line);
      transform: translateX(-100%);
      transition: transform 0.28s cubic-bezier(0.22, 1, 0.36, 1);
      z-index: 20;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #drawer.open { transform: translateX(0); }

    #edge-hotzone {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: 16px;
      z-index: 19;
    }

    #handle {
      position: fixed;
      top: 50%; left: 0;
      transform: translateY(-50%);
      width: 4px; height: 72px;
      border-radius: 0 4px 4px 0;
      background: rgba(255, 255, 255, 0.28);
      z-index: 18;
      opacity: 0;
      transition: opacity 0.4s;
      pointer-events: none;
    }
    body.mouse-active #handle { opacity: 1; }
    #drawer.open ~ #handle { opacity: 0; }

    #drawer header {
      padding: 14px 14px 10px;
      flex-shrink: 0;
    }
    .nav-link {
      display: block;
      margin-bottom: 10px;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--text);
      text-decoration: none;
      font-size: 13px;
      background: rgba(255, 255, 255, 0.05);
    }
    .nav-link:hover { border-color: var(--accent); color: var(--accent); }
    #search {
      width: 100%;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      font-size: 13px;
      outline: none;
    }
    #search:focus { border-color: var(--accent); }
    #search::placeholder { color: var(--muted); }

    #drawer .scroll {
      overflow-y: auto;
      flex: 1;
      padding: 0 12px 18px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,.15) transparent;
    }

    .item {
      display: block; width: 100%; text-align: left;
      padding: 8px 12px; margin-bottom: 3px;
      background: transparent; color: var(--text);
      border: none; border-radius: 8px;
      cursor: pointer; font-size: 14px;
      transition: background 0.15s;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .item:hover { background: rgba(255, 255, 255, 0.07); }
    .item.active { background: var(--accent); color: #0b1220; font-weight: 600; }

    .char.hidden { display: none; }
    .char > .item { font-weight: 600; }
    .char > .item::before {
      content: "▸"; display: inline-block;
      margin-right: 8px; color: var(--muted);
      transition: transform 0.2s;
    }
    .char.expanded > .item::before { transform: rotate(90deg); }
    .char.expanded > .item { color: var(--accent); }

    .sub {
      display: none;
      margin-left: 10px;
      border-left: 1px solid var(--line);
      padding-left: 8px;
    }
    .char.expanded .sub { display: block; }

    .sub-label {
      font-size: 11px; color: var(--muted);
      letter-spacing: 1.5px; text-transform: uppercase;
      margin: 10px 0 4px 12px;
    }
    .sub .item { font-size: 13px; padding: 6px 12px; }
    .sub .item.disabled { color: var(--muted); cursor: default; }

    /* 表情：可折叠分组 + 紧凑编号网格（角色表情可达 50+，平铺会撑爆菜单）*/
    .face-head {
      display: block; width: 100%; text-align: left;
      background: transparent; border: none; cursor: pointer;
      color: var(--muted); font-size: 11px;
      letter-spacing: 1.5px; text-transform: uppercase;
      padding: 10px 12px 4px;
    }
    .face-head::before {
      content: "▸"; display: inline-block;
      margin-right: 6px; transition: transform 0.2s;
    }
    .face-group.open .face-head::before { transform: rotate(90deg); }
    .face-head:hover { color: var(--text); }
    .face-head span { text-transform: none; letter-spacing: 0; }
    .face-body { display: none; }
    .face-group.open .face-body { display: block; }
    .face-grid {
      display: flex; flex-wrap: wrap; gap: 4px;
      padding: 2px 12px 6px;
    }
    .face-chip {
      min-width: 34px; padding: 5px 6px;
      text-align: center; font-size: 12px;
      border: 1px solid var(--line); border-radius: 6px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--text); cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .face-chip:hover { border-color: var(--accent); color: var(--accent); }
    .face-chip.active {
      background: var(--accent); color: #0b1220;
      font-weight: 600; border-color: var(--accent);
    }

    /* 形态切换：立绘 / 技能动画 并排 */
    .mode-btn {
      display: inline-block;
      width: calc(50% - 2px);
      text-align: center;
      border: 1px solid var(--line);
    }
    .mode-btn:only-of-type { width: 100%; }

    #drawer footer {
      flex-shrink: 0;
      padding: 10px 16px 13px;
      font-size: 11px; color: var(--muted);
      border-top: 1px solid var(--line);
      line-height: 1.7;
    }

    #error-toast {
      position: fixed; left: 50%; bottom: 32px;
      transform: translateX(-50%);
      background: #3a1d22; color: #ff9d9d;
      padding: 10px 18px; border-radius: 10px;
      font-size: 13px; z-index: 30;
      display: none;
      max-width: 80vw;
    }
  </style>
</head>
<body>
  <div id="stage"></div>
  <div id="vignette"></div>

  <div id="edge-hotzone"></div>
  <nav id="drawer">
    <header>
      <a class="nav-link" href="./dating.html">心契之约</a>
      <input id="search" type="text" placeholder="搜索角色…" autocomplete="off" />
    </header>
    <div class="scroll" id="char-tree"></div>
    <footer id="footer">双击画面切换全屏 · 鼠标移到左缘呼出菜单</footer>
  </nav>
  <div id="handle"></div>
  <div id="error-toast"></div>

  <script>
    // 素材根目录：本地/家庭主机直接用 upstream/ 克隆；
    // 跑在 GitHub Pages（*.github.io）上时自动切到 CDN（钉死上游 commit，
    // 上游更新后改这一个常量即可——或由 Actions 定时工作流自动改）。
    const UPSTREAM_COMMIT = "c22400c07bfd";
    const params = new URLSearchParams(location.search);
    const useCdn = location.hostname.endsWith("github.io")   // Pages 上自动走 CDN
      || params.has("cdn");                                  // 本地加 ?cdn=1 可模拟
    const customAssetBases = params.get("asset_base")
      ?.split(",")
      .map(v => v.trim())
      .filter(Boolean)
      .map(normalizeAssetBase) || [];

    // 国内坑：cdn.jsdelivr.net 常被 DNS 污染——请求落到错误的服务器，返回的页面没有
    // CORS 头，浏览器就报「blocked by CORS policy」（看着像 CORS 错，其实是被墙）。
    // 同一份文件 jsDelivr 有多个镜像域名（都带正确 CORS），这里启动时并行探测，
    // 用第一个真正可达的。探测会校验返回内容，防止污染服务器的假响应蒙混过关。
    const CDN_HOSTS = [
      "fastly.jsdelivr.net",     // Fastly 骨干，国内通常比 cdn.jsdelivr.net 好
      "jsdelivr.b-cdn.net",      // BunnyCDN 镜像
      "gcore.jsdelivr.net",      // Gcore，亚洲节点多
      "testingcf.jsdelivr.net",  // Cloudflare 镜像
      "cdn.jsdelivr.net",        // 官方主域（最常被污染，放最后兜底）
    ];
    const cdnBase = h => `https://${h}/gh/myssal/Brown-Dust-2-Asset@${UPSTREAM_COMMIT}/`;

    let ASSET_BASE = "./upstream/";   // 本地 / 家庭主机默认；Pages 由 resolveAssetBase() 改写
    let cdnHostUsed = "本地";

    function normalizeAssetBase(base) {
      return base.endsWith("/") ? base : base + "/";
    }

    function assetUrl(path) {
      return ASSET_BASE + path;
    }

    // 探测可达镜像：fetch 跨域且无 CORS 头时会 reject（被墙的污染响应正好如此），
    // 所以「fetch 成功 + 内容含已知标记」才算真可达。Promise.any 取第一个成功的。
    async function resolveAssetBase() {
      if (customAssetBases.length) {
        ASSET_BASE = customAssetBases[0];
        cdnHostUsed = "自定义";
        return;
      }
      if (!useCdn) return;
      const probe = "spine/char/char000101/char000101.atlas";
      const tryHost = async (h) => {
        const ctrl = new AbortController();
        const timer = setTimeout(() => ctrl.abort(), 4000);
        try {
          const r = await fetch(cdnBase(h) + probe, { signal: ctrl.signal });
          if (!r.ok) throw new Error("status " + r.status);
          const txt = await r.text();
          if (!txt.includes("char000101")) throw new Error("bad content"); // 防污染假响应
          return h;
        } finally { clearTimeout(timer); }
      };
      try {
        const h = await Promise.any(CDN_HOSTS.map(tryHost));
        ASSET_BASE = cdnBase(h);
        cdnHostUsed = h;
      } catch (e) {
        // 全部镜像都不可达：仍给个默认值（让后续加载照常报错），并提示用户
        ASSET_BASE = cdnBase("cdn.jsdelivr.net");
        cdnHostUsed = "（全部 CDN 镜像不可达，可能整段被墙——建议用家庭主机部署）";
        showError("素材 CDN 全部不可达，可能被墙：" + cdnHostUsed);
      }
    }

    const stage = document.getElementById("stage");
    const vignette = document.getElementById("vignette");
    const drawer = document.getElementById("drawer");
    const tree = document.getElementById("char-tree");
    const toast = document.getElementById("error-toast");
    const search = document.getElementById("search");

    let player = null;            // 兼容立绘形态：等价于 cutscene 模式下 layerPlayers[mainLayerIdx]
    const layerPlayers = [];      // cutscene 模式下按 z-order 由低到高排列的所有 spine player（含主+副）
    let mainLayerIdx = 0;         // layerPlayers 里 role="main" 的索引（schedule 默认 layerIdx）
    // 角色 → cutscene 多层结构（来自 Unity 场景 Anchors/object/ 下 SkeletonGraphic 实例的 sibling 顺序）。
    // 列表按 z-order 从下到上：先画的在底。role 取值 back / main / fx / front（仅说明用，逻辑只看 layerIdx）。
    // 详见 AGENTS.md「多 skel + 多实例 叠播 cutscene」段。
    // 先硬编 003803 验证；通用化后由 gen_roster.py 扫 cutscene bundle 自动写入 roster.json。
    const CUTSCENE_LAYERS = {
      "003803": [
        { role: "back",  skeleton: "spine/cutscenes/cutscene_char003803_1/cutscene_char003803_1.skel",
                         atlas:    "spine/cutscenes/cutscene_char003803_1/cutscene_char003803_1.atlas" },
        { role: "main",  skeleton: "spine/cutscenes/cutscene_char003803/cutscene_char003803.skel",
                         atlas:    "spine/cutscenes/cutscene_char003803/cutscene_char003803.atlas" },
        { role: "fx",    skeleton: "spine/cutscenes/cutscene_char003803/cutscene_char003803.skel",
                         atlas:    "spine/cutscenes/cutscene_char003803/cutscene_char003803.atlas" },
        { role: "front", skeleton: "spine/cutscenes/cutscene_char003803_1/cutscene_char003803_1.skel",
                         atlas:    "spine/cutscenes/cutscene_char003803_1/cutscene_char003803_1.atlas" },
      ],
    };
    let activeCostumeBtn = null;
    let currentCostume = null;
    let currentPart = null;      // "idle"（立绘）| "cutscene"（技能动画）
    let currentAnimBox = null;

    // 立绘模型常见动画的友好名（未知的保留原名）
    const IDLE_LABELS = { idle: "待机", idle_talk: "对话", motion: "互动" };

    function showError(msg) {
      toast.textContent = msg;
      toast.style.display = "block";
      setTimeout(() => (toast.style.display = "none"), 6000);
    }

    function selectCostume(costume, btn, animBox) {
      if (activeCostumeBtn) activeCostumeBtn.classList.remove("active");
      activeCostumeBtn = btn;
      btn.classList.add("active");
      currentCostume = costume;
      currentAnimBox = animBox;
      loadPart(costume.idle ? "idle" : "cutscene");
    }

    // 形态切换行：立绘（待机模型）/ 技能动画（cutscene），与 gamekee 的服装拆解一致
    function renderModeRow(animBox) {
      animBox.innerHTML = "";
      const costume = currentCostume;
      [["idle", "立绘"], ["cutscene", "技能动画"]].forEach(([part, label]) => {
        if (!costume[part]) return;
        const b = document.createElement("button");
        b.className = "item mode-btn" + (part === currentPart ? " active" : "");
        b.textContent = label;
        b.onclick = () => { if (part !== currentPart) loadPart(part); };
        animBox.appendChild(b);
      });
      const hint = document.createElement("div");
      hint.className = "sub-label";
      hint.textContent = "动作";
      animBox.appendChild(hint);
      const box = document.createElement("div");
      box.className = "entry-box";
      box.innerHTML = '<button class="item disabled">加载中…</button>';
      animBox.appendChild(box);
      return box;
    }

    // 游戏技能动画的取景：从 APK 提取——显示窗口 1600×720（≈2.22:1，比 16:9 更宽），
    // SkeletonGraphic scale=1 居中。背景图也是按这个比例出的。
    // 要还原游戏感，舞台必须锁成这个比例：浏览器宽高比不固定，靠 letterbox/pillarbox 留黑边。
    // CUT_CY=150 是原点上移量（自然裁掉腿部，呈游戏式低机位横屏构图）。
    const CUT_W = 1600, CUT_H = 720, CUT_CX = 0, CUT_CY = 150;
    function cutsceneViewport() {
      // 舞台已经锁成 1600:720，viewport 用游戏原值即可
      return { x: CUT_CX - CUT_W / 2, y: CUT_CY - CUT_H / 2, width: CUT_W, height: CUT_H };
    }

    // 计算一组动画的并集包围盒（给 per-animation viewport 用），p 是 spine-player
    function unionAnimViewport(p, animNames) {
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      for (const name of animNames) {
        const anim = p?.skeleton?.data?.findAnimation?.(name);
        if (!anim) continue;
        const b = {};
        try { p.calculateAnimationViewport(anim, b); }
        catch(_) { continue; }
        if (b.x < minX) minX = b.x;
        if (b.y < minY) minY = b.y;
        if (b.x + b.width  > maxX) maxX = b.x + b.width;
        if (b.y + b.height > maxY) maxY = b.y + b.height;
      }
      if (!isFinite(minX)) return null;
      return { x: minX, y: minY, width: maxX - minX, height: maxY - minY };
    }

    // cutscene 模式：把所有层 player 的 viewport 设成同一个固定框 = 主层 cut_A∪cut_B 的包围盒，
    // 所有层共用 = 坐标系完全一致、绝对对齐。
    // 为什么只算主层、不算副层：副层（cut_B_B 背景 / cut_B_F 前景）的包围盒含巨大特效轨迹（B_Trans_FX
    // 之类），把它们算进并集会让 cut_A 阶段镜头被拉得离主角很远，人物变小。游戏里副层也是按主角
    // 同坐标系绘制，所以用主层的取景框来 fit 是合理的（副层超出去的部分会被裁掉，正常）。
    function setupCutsceneViewports() {
      const mainP = layerPlayers[mainLayerIdx];
      if (!mainP?.skeleton) return;
      if (!layerPlayers.every(p => p?.skeleton)) return;

      // 用主层的 cut_A、cut_B 两个核心姿态求并集（cut_A_fx 不算——它跑在 fx 层但骨骼一样、bbox 会很大）
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      for (const name of ["cut_A", "cut_B"]) {
        const a = mainP.skeleton.data.findAnimation?.(name);
        if (!a) continue;
        const b = {};
        try { mainP.calculateAnimationViewport(a, b); }
        catch(_) { continue; }
        if (b.x < minX) minX = b.x;
        if (b.y < minY) minY = b.y;
        if (b.x + b.width  > maxX) maxX = b.x + b.width;
        if (b.y + b.height > maxY) maxY = b.y + b.height;
      }
      if (!isFinite(minX)) return;
      const w = maxX - minX, h = maxY - minY;
      const ratio = 0.08;   // 外扩 8% 留白
      const box = {
        x: minX - w * ratio,
        y: minY - h * ratio,
        width:  w * (1 + ratio * 2),
        height: h * (1 + ratio * 2),
      };
      layerPlayers.forEach(p => {
        if (!p?.config?.viewport) return;
        Object.assign(p.config.viewport, box);
        p.config.viewport.animations = {};
      });
    }

    // 把 #stage 锁成游戏窗口比例并居中；同时同步 #vignette 的 inset，让暗角只盖在舞台上
    function layoutStage() {
      const isCutscene = currentPart === "cutscene";
      if (!isCutscene) {
        stage.style.left = stage.style.right = stage.style.top = stage.style.bottom = "0";
        vignette.style.left = vignette.style.right = vignette.style.top = vignette.style.bottom = "0";
        return;
      }
      const W = window.innerWidth, H = window.innerHeight;
      const target = CUT_W / CUT_H;     // 游戏比例
      let sw, sh;
      if (W / H > target) {             // 浏览器太宽 → 左右 pillarbox
        sh = H; sw = H * target;
      } else {                          // 浏览器太高 → 上下 letterbox
        sw = W; sh = W / target;
      }
      const left = (W - sw) / 2, top = (H - sh) / 2;
      for (const el of [stage, vignette]) {
        el.style.left = left + "px";
        el.style.top = top + "px";
        el.style.right = (W - sw - left) + "px";
        el.style.bottom = (H - sh - top) + "px";
      }
    }
    window.addEventListener("resize", layoutStage);

    // ───── 真实运镜（数据来自 data/cutscene_shots.json，APK Timeline 解出） ─────
    // 每个 cutscene 一条记录：
    //   tracks: { "Anchors.AnchoredX": [[t,v],...], ... }  连续曲线，前端线性插值
    //   events: [[t, name, on], ...]                       离散 on/off（Bg 切换、PostProcessVolume 切换）
    // 运镜：实时按 RAF 在 #stage 子元素上写 translate；调色：PostProcessVolume vs PP 2 在线切两套 CSS filter。
    let cutsceneShots = null;   // 全角色数据；启动时异步加载
    let currentShotData = null; // 当前服装的记录
    let timelineRaf = 0;        // 当前 RAF 句柄，方便取消
    let timelineStartMs = 0;

    fetch("./data/cutscene_shots.json?v=" + Date.now())
      .then(r => r.ok ? r.json() : null)
      .then(d => { if (d) cutsceneShots = d.characters || d; })
      .catch(() => {});

    // 线性插值：找到 t 落在哪两个 key 之间
    function sampleTrack(keys, t) {
      if (!keys || !keys.length) return 0;
      if (t <= keys[0][0]) return keys[0][1];
      const last = keys[keys.length - 1];
      if (t >= last[0]) return last[1];
      for (let i = 1; i < keys.length; i++) {
        if (keys[i][0] >= t) {
          const [t0, v0] = keys[i - 1], [t1, v1] = keys[i];
          return v0 + (v1 - v0) * (t - t0) / (t1 - t0);
        }
      }
      return last[1];
    }

    // 找该 event name 在 t 时刻最后一次 on/off 状态（用于 PostProcessVolume 切换）
    function lastEventState(events, name, t) {
      let state = null;
      for (const [et, ename, on] of events || []) {
        if (et > t) break;
        if (ename === name) state = on;
      }
      return state;
    }

    function applyTimelineAt(d, t) {
      // 暂不做 translate 运镜：Anchors.AnchoredX/Y 的语义因角色而异——有的角色用大数值把 UI 容器
      // "飞出屏幕"切回战斗 UI（如 char000101 的 5000/200000），有的是 anchor preset 的归一化值
      // （如 char003803 的 0.7-0.87），还没找到统一可靠的相机节点。
      // 留 PostProcessVolume 切换做颜色分段：main=暖，PostProcessVolume 2=alt(暗冷)。
      const alt = lastEventState(d.events, "PostProcessVolume 2", t) === true
               && lastEventState(d.events, "PostProcessVolume",   t) !== true;
      document.body.classList.toggle("cutscene-fx-alt", alt);
    }

    function stopTimeline() {
      if (timelineRaf) cancelAnimationFrame(timelineRaf);
      timelineRaf = 0;
    }

    function startTimeline() {
      stopTimeline();
      const d = currentShotData;
      if (!d || currentPart !== "cutscene") {
        document.body.classList.remove("cutscene-fx-alt");
        return;
      }
      timelineStartMs = performance.now();
      const tick = () => {
        const t = (performance.now() - timelineStartMs) / 1000;
        applyTimelineAt(d, Math.min(t, d.duration));
        // 到 duration 后停在末态（前端的 spine 链可能还在播，但 Timeline 已结束）
        if (t < d.duration) timelineRaf = requestAnimationFrame(tick);
        else timelineRaf = 0;
      };
      tick();
    }

    function loadPart(part) {
      const costume = currentCostume, animBox = currentAnimBox;
      const src = costume[part];
      if (!src) return;
      currentPart = part;
      if (layerPlayers.length) { layerPlayers.forEach(p => { try { p.dispose(); } catch(_){} }); layerPlayers.length = 0; }
      player = null; mainLayerIdx = 0;
      stage.innerHTML = "";
      renderModeRow(animBox);

      // 技能动画走「游戏化」呈现：横屏取景 + 后期；立绘走完整人物取景
      const isCutscene = part === "cutscene";
      document.body.classList.toggle("cutscene-fx", isCutscene);
      layoutStage();   // 先锁好舞台尺寸再创建播放器，避免 viewport 按错误的容器比例计算
      stopTimeline();  // 切换形态/服装时先停旧 Timeline，待新主 cut 开始时再起
      // 从骨骼路径里抠出 6 位服装 ID（如 spine/cutscenes/cutscene_char003803/... → "003803"），
      // 用作 cutscene_shots.json 的 key。idle 形态不需要。
      if (isCutscene && cutsceneShots) {
        const m = (src.skeleton || "").match(/cutscene_char(\d{6})/);
        currentShotData = m ? cutsceneShots[m[1]] || null : null;
      } else {
        currentShotData = null;
      }

      // 背景：技能动画的场景图（roster 提供，来自游戏资源 char<id>_back<N>），
      // 画在同一镜头里（与人物共享取景）。bg 在 costume 上、数组按动作 1/2 对应。
      // 不在这里作为必需资源加载——改在 success 里异步加载（见 createPlayer），缺失也不致命。
      const cutBgs = isCutscene && Array.isArray(costume.bg) ? costume.bg : [];

      // 决定要创建几层 player：
      //   立绘形态：永远 1 层（src 自己）
      //   cutscene 形态：若 CUTSCENE_LAYERS[charId] 有定义就按它列表（多实例叠层），
      //                   否则退回单层（src 自己）
      const charId = isCutscene ? (src.skeleton || "").match(/cutscene_char(\d{6})/)?.[1] : null;
      const layersDef = (isCutscene && charId && CUTSCENE_LAYERS[charId]) || null;
      const layers = layersDef
        || [{ role: "main", skeleton: src.skeleton, atlas: src.atlas }];
      mainLayerIdx = layers.findIndex(l => l.role === "main");
      if (mainLayerIdx < 0) mainLayerIdx = 0;

      // 每层一个绝对定位 div，DOM append 顺序 = z-order（先 append 的在底，role: back → main → fx → front）
      layers.forEach((ly, idx) => {
        const div = document.createElement("div");
        div.className = "cut-layer";
        div.id = `cut-layer-${idx}`;
        stage.appendChild(div);
        const isMain = idx === mainLayerIdx;
        const cfg = {
          atlasUrl: assetUrl(ly.atlas),
          showControls: false,
          showLoading: false,
          alpha: true,
          premultipliedAlpha: false,
          // 所有层先用宽松 padding 自适应；cutscene 模式 success 后由 setupCutsceneViewports
          // 改写成主层 cut_A∪cut_B 的固定框（共用同一框 = 对齐）。立绘单层时按下面 idle 分支锁定。
          viewport: { padLeft: "5%", padRight: "5%", padTop: "5%", padBottom: "5%" },
          success: (p) => {
            // pma 模式（gamekee=pma / myssal=直通），从 atlas 读
            try {
              const atlas = Object.entries(p.assetManager.assets).find(([k]) => k.endsWith(".atlas"))[1];
              p.config.premultipliedAlpha = atlas.pages.some(pg => pg.pma);
            } catch(_) {}

            if (!isCutscene && part === "idle") {
              // 立绘形态锁定取景（详见 AGENTS.md「立绘取景锁定」段）
              try {
                const anims = p.skeleton.data.animations;
                const rest = anims.find(a => /idle/i.test(a.name) && !a.name.startsWith("_"))
                          || anims.find(a => !a.name.startsWith("_"));
                if (rest) {
                  const box = {};
                  p.calculateAnimationViewport(rest, box);
                  Object.assign(p.config.viewport, { x: box.x, y: box.y, width: box.width, height: box.height });
                }
              } catch(_) {}
            }

            // 非主层（back/fx/front）默认隐身——清空所有 slot.attachment，等 schedule 起播再由
            // 动画自己的 AttachmentTimeline 设回去。否则 setup pose 的默认 attachment 在 cut_A
            // 阶段就会画出"飘浮鬼影"（cut_B_B/F 的身体部件挂在主角位置）。
            if (isCutscene && !isMain) {
              try {
                p.animationState.clearTracks();
                p.skeleton.setToSetupPose();
                for (const slot of p.skeleton.slots) slot.attachment = null;
              } catch(_) {}
            }

            if (isMain) {
              // 背景图（仅主层有，与角色共一个镜头）
              p._bgLoaded = new Set(); p._bgWant = null;
              p.applyBg = () => {
                if (p.disposed) return;
                const want = p._bgWant;
                if (want && p._bgLoaded.has(want)) {
                  if (p.config.backgroundImage) p.config.backgroundImage.url = want;
                  else p.config.backgroundImage = { url: want };
                } else {
                  p.config.backgroundImage = null;
                }
              };
              cutBgs.forEach(b => {
                const url = "./" + b;
                p.assetManager.loadTexture(url,
                  () => { p._bgLoaded.add(url); p.applyBg(); },
                  () => { /* 缺失忽略 */ });
              });

              renderEntries(p, animBox);
            }

            // cutscene 模式：所有层就绪后写共享 viewport
            if (isCutscene) {
              setTimeout(() => {
                if (layerPlayers.every(lp => lp?.skeleton)) setupCutsceneViewports();
              }, 0);
            }
          },
          error: (_p, reason) => {
            if (isMain) showError("加载失败：" + reason);
            else console.warn(`[layer ${idx} ${ly.role}] ${reason}`);
          },
        };
        if (ly.skeleton.endsWith(".skel")) cfg.skelUrl = assetUrl(ly.skeleton);
        else cfg.jsonUrl = assetUrl(ly.skeleton);
        const lp = new spine.SpinePlayer(div.id, cfg);
        lp._role = ly.role; lp._layerIdx = idx;
        layerPlayers.push(lp);
      });
      // 主 player 引用：兼容 idle 模式 / 老代码 / 外部钩子。layerPlayers[mainLayerIdx] 是同一个实例。
      player = layerPlayers[mainLayerIdx];
      window._dbgPlayer = player;
      window._dbgLayers = layerPlayers;
    }

    // 动画的播放逻辑还原游戏内的结构：
    //  - 身体动画（轨道0）：idle/loop 类循环播放；motion/cut_a 类一次性动作播完
    //    自动衔接回循环待机，而不是僵住或孤立循环
    //  - _face* 是表情（轨道1），叠加在身体动画上同时播，可点击开/关
    //  - 立绘形态的动作用友好名（待机/对话/互动），技能动画形态编号为 动作1、动作2…
    function renderEntries(p, animBox) {
      const entryBox = renderModeRow(animBox);
      const names = p.skeleton.data.animations.map(a => a.name);
      const faces = names.filter(n => n.startsWith("_"));
      const allBodies = names.filter(n => !n.startsWith("_"));
      const isLoopName = n => /idle|loop/i.test(n);

      // 把身体动画分成「主 cut」和「叠加特效（overlay）」两组。
      // 游戏里 Timeline 有粒子轨；导出到 spine 时，制作者通常把光效/血花/武器轨迹/召唤物
      // 也做成 spine 动画（与主 cut 同一骨骼，不同插槽），需要在另一条轨道上**同时叠加播放**。
      // 之前所有非下划线开头的都被当成独立动作，导致：
      //   1) overlay 被串进主链当下一段播放（顺序错）
      //   2) overlay 显示成独立的"动作 N"按钮（数量错）
      //   3) 主链播放时 overlay 不出现（特效缺失）
      // 主 cut 的命名很规整：cut_1、cut_A、A_cut、A_cut2、loop、loop_2、idle、motion …
      // 用严格正则白名单识别；剩下的按前缀（数字、Letter_、cut_X_）配对到主 cut。
      const MAIN_RE = /^(cut_\d+|cut_[A-Z]|[A-Z]_cut\d*|loop\d*|idle\w*|motion)$/;
      const mainsSet = new Set(allBodies.filter(n => MAIN_RE.test(n)));
      const overlayTarget = (n) => {
        if (mainsSet.has(n)) return null;
        if (isLoopName(n)) return null;        // 独立 loop/idle 保留在主列表
        // cut_3_dragon_head → cut_3 ；cut_1_idle_01 也会命中但 isLoopName 已挡掉
        let m = n.match(/^(cut_[A-Za-z0-9]+)_/);
        if (m && mainsSet.has(m[1])) return m[1];
        // 1_mask_effect_start → cut_1
        m = n.match(/^(\d+)_/);
        if (m && mainsSet.has("cut_" + m[1])) return "cut_" + m[1];
        // A_weapon_effect → A_cut；B_fx_1 → B_cut（取同字母的第一个主 cut）
        m = n.match(/^([A-Z])_/);
        if (m) {
          const target = allBodies.find(b => mainsSet.has(b) && b.startsWith(m[1] + "_cut"));
          if (target) return target;
        }
        // 部件化角色（如 char003803 黎维塔奇迹玫瑰）把每个身体部件做成独立的小写前缀动画：
        //   a_arm1_1_clothes_1 / a_arm1_1_hand_1 / a_arm1_1_ribbon_1 / a_arm1_1_fx_1 / a_arm1_1badge
        // 对应主 cut 的字母变体（a → cut_A 或 A_cut）。只播主 cut 看不到衣服/丝带/手部。
        // 配到主 cut 后，下方按 base 分组会把每个 base（如 a_arm1_1_clothes 的 _1/_2）串到一条轨道，
        // 多组并行叠播。多 pose（a_arm1_1 / a_arm1_2 / a_arm2_1 / a_arm2_2）目前同时上轨——
        // 不完全准（游戏 Timeline 里它们是顺序触发），但至少能看到衣服/丝带不再缺。
        m = n.match(/^([a-z])_/);
        if (m) {
          const L = m[1].toUpperCase();
          if (mainsSet.has("cut_" + L)) return "cut_" + L;
          if (mainsSet.has(L + "_cut")) return L + "_cut";
          const target = allBodies.find(b => mainsSet.has(b) && b.startsWith(L + "_cut"));
          if (target) return target;
        }
        return null;
      };

      // 把 overlay 按"base"（去掉 _start/_end/_数字 尾巴）分组：
      //   同 base 内顺序串播在同一条轨道（如 1_mask_effect_start → _end）
      //   不同 base 并行在相邻轨道（如龙的 body/breath/head 各自一条）
      const overlaysByMain = {};   // main → [ [seqOnTrack2], [seqOnTrack3], ... ]
      const overlayNames = new Set();
      allBodies.forEach(n => {
        const main = overlayTarget(n);
        if (!main) return;
        overlayNames.add(n);
        const base = n.replace(/_(start|end|\d+)$/i, "");
        const groups = overlaysByMain[main] || (overlaysByMain[main] = []);
        let g = groups.find(grp => grp._base === base);
        if (!g) { g = []; g._base = base; groups.push(g); }
        g.push(n);
      });

      // 主链只在「非 overlay」上面跑（保留 cut_1 → cut_2 → cut_3 → loop 的串接）
      const bodies = allBodies.filter(n => !overlayNames.has(n));
      const baseLoop = bodies.find(isLoopName);

      // 一次性动作播完后串联哪些动画（按骨骼内作者排序＝播放顺序）：
      //  1) 有同名配对（cut_1 → cut_1_idle / xxx_loop）就只接它
      //  2) 否则把后续片段依次排队（cut_1 → cut_2 → cut_3 → …），直到第一个循环为止
      //  3) 后面没有循环则回默认循环
      const chainQueue = (name) => {
        for (const suf of ["_idle", "_loop"]) {
          if (bodies.includes(name + suf)) return [name + suf];
        }
        const queue = [];
        for (let j = bodies.indexOf(name) + 1; j < bodies.length; j++) {
          const n = bodies[j];
          if (n.endsWith("_ef")) continue; // 特效片段是叠加用的，不串进主序列
          if (isLoopName(n)) break;        // 碰到循环就停，下面统一加最后一个 loop
          queue.push(n);
        }
        // 链尾循环：用 bodies 里**最后一个** loop（如 loop_2 优先于 loop）。
        // 原因：某些角色（如 char003803）的 loop 是"翻腾过渡帧"（横躺、上半身藏在镜头外），
        // loop_2 才是稳定的 hero 终态（站立、面朝镜头、衣服展开）。游戏 Timeline 里末段播 loop_2，
        // 我们没接 Timeline 就直接用最后一个 loop 当链尾，对绝大多数角色都更接近游戏感。
        const loops = bodies.filter(isLoopName);
        if (loops.length) queue.push(loops[loops.length - 1]);
        else if (baseLoop && baseLoop !== name) queue.push(baseLoop);
        return queue;
      };

      // 把整条链整合成一个条目：中间片段（cut_2、cut_3）和同名配对的收尾
      // 循环（cut_1_idle）折叠进链头，不再单独列出；通用循环（loop 等）保留。
      const entries = [];
      const consumed = new Set();
      bodies.forEach(name => {
        if (consumed.has(name)) return;
        if (isLoopName(name)) { entries.push([name]); return; }
        const seq = [name, ...chainQueue(name)];
        seq.slice(1).forEach(n => {
          const paired = n === name + "_idle" || n === name + "_loop";
          if (!isLoopName(n) || paired) consumed.add(n); // 通用循环不折叠
        });
        entries.push(seq);
      });

      // 当前服装的 cutscene 背景列表（按动作 1/2 对应 bg[0]/bg[1]，缺则共用）
      const bgs = (currentPart === "cutscene" && Array.isArray(currentCostume.bg))
        ? currentCostume.bg : [];

      // overlay 调度策略：链首主 cut 起播时，把**所有 main 的所有 overlay 组**一次性
      // 全部上轨（每组循环第一段），后续 cut_B/loop 起播都不再动 overlay 轨。
      // 这样避免了 cut_B 起播时把 cut_A 的部件清掉，导致衣服/丝带消失。
      // 视觉上多 pose 同时叠播不精确（游戏 Timeline 里是顺序触发），但优于"裸体只剩骨骼"。
      let overlaysStarted = false;
      const scheduleOverlaysFor = (_mainName) => {
        if (!player || overlaysStarted) return;
        let track = 2;
        for (const groups of Object.values(overlaysByMain)) {
          if (!groups) continue;
          for (const group of groups) {
            try {
              player.animationState.setAnimation(track, group[0], true);
            } catch (e) { /* 找不到的 overlay 静默跳过 */ }
            track++;
          }
        }
        overlaysStarted = true;
      };
      const resetOverlays = () => { overlaysStarted = false; };

      // 记录当前正在播的链，给 start 监听器算 segIdx 用（驱动运镜阶梯）
      let currentSeqRef = [];

      // ===== 验证用：硬编 char003803 的真实 Timeline 剧本 =====
      // 数据来源：本地 APK 备份解出来的 Char003803_Skill TimelineAsset
      // + /CutScene_Char003803_Set/SpineRoot/CutScene/Anchors/object 下 SkeletonGraphic
      //   实例的 sibling z-order（详见 /tmp/dump_skill_scene.py 与 AGENTS.md 该段）。
      // 每条 schedule track 对应一层 player（layerIdx → CUTSCENE_LAYERS[charId][layerIdx]），
      // **每个 player 内部只用 spine track 0**（同 skel 多轨会 attachment 冲突）。
      // 字段：startWall=Timeline 墙钟起播时刻；wallDur=墙钟时长；clipIn=spine 动画内起播偏移；
      //       ts=timeScale；animationEnd = clipIn + wallDur*ts。
      const SKILL_SCHEDULES = {
        "003803": {
          duration: 8.883,
          tracks: [
            // layer 0 = back（_1 skel 实例 #1）
            { layerIdx: 0, clips: [
              { anim: "cut_B_B", startWall: 3.367, wallDur: 1.500, clipIn: 0, ts: 1.00 },
            ]},
            // layer 1 = main（主 skel 实例 #1）
            { layerIdx: 1, clips: [
              { anim: "cut_A", startWall: 0.000, wallDur: 3.367, clipIn: 0,    ts: 1.00 },
              { anim: "cut_B", startWall: 3.367, wallDur: 3.133, clipIn: 0,    ts: 1.00 },
              { anim: "cut_B", startWall: 6.500, wallDur: 0.650, clipIn: 5.27, ts: 0.60 },
              { anim: "cut_B", startWall: 7.150, wallDur: 1.733, clipIn: 4.15, ts: 0.85 },
            ]},
            // layer 2 = fx（主 skel 实例 #2，跑特效动画）
            { layerIdx: 2, clips: [
              { anim: "cut_A_fx", startWall: 0.000, wallDur: 3.317, clipIn: 0, ts: 1.00 },
            ]},
            // layer 3 = front（_1 skel 实例 #2）
            { layerIdx: 3, clips: [
              { anim: "cut_B_F", startWall: 3.367, wallDur: 1.500, clipIn: 0, ts: 1.00 },
            ]},
          ],
        },
      };

      function playScheduledSkill(schedule) {
        if (!layerPlayers.length) return;

        // 重置每层 player：清轨 + setup pose；非主层再清 slot.attachment 避免 setup pose 鬼影
        layerPlayers.forEach((p, i) => {
          if (!p?.animationState || !p?.skeleton) return;
          try {
            p.animationState.clearTracks();
            p.skeleton.setToSetupPose();
            if (i !== mainLayerIdx) for (const slot of p.skeleton.slots) slot.attachment = null;
          } catch(_){}
        });

        const applyEntry = (e, c) => {
          if (!e) return;
          e.animationStart = c.clipIn;
          e.animationEnd   = c.clipIn + c.wallDur * c.ts;
          e.timeScale      = c.ts;
          e.mixDuration    = 0;
        };

        schedule.tracks.forEach((tr) => {
          const p = layerPlayers[tr.layerIdx];
          if (!p?.animationState || !p?.skeleton) return;   // 该层还没 success 时跳过
          const sorted = [...tr.clips].sort((a,b) => a.startWall - b.startWall);

          // 每个 player 只用 spine track 0。startWall>0 → setEmpty(0,0) 占位 + addAnimation(delay=startWall)
          let firstEntry = null;
          if (sorted[0].startWall > 0.001) {
            p.animationState.setEmptyAnimation(0, 0);
            firstEntry = p.animationState.addAnimation(0, sorted[0].anim, false, sorted[0].startWall);
          } else if (tr.layerIdx === mainLayerIdx) {
            // 主层首 clip 走 spine-player wrapper（触发其内部 redraw 钩子）
            firstEntry = p.setAnimation(sorted[0].anim, false);
          } else {
            firstEntry = p.animationState.setAnimation(0, sorted[0].anim, false);
          }
          applyEntry(firstEntry, sorted[0]);
          for (let i = 1; i < sorted.length; i++) {
            applyEntry(p.animationState.addAnimation(0, sorted[i].anim, false, 0), sorted[i]);
          }
          p.play();
        });
      }

      const playSeq = (seq, btn, entryIdx) => {
        if (!player) return;
        try {
          // 该角色若有权威剧本就走 schedule 分支（不用 chainQueue 启发式）
          const charId = (currentCostume?.cutscene?.skeleton || "").match(/cutscene_char(\d{6})/)?.[1];
          const schedule = charId && SKILL_SCHEDULES[charId];
          if (currentPart === "cutscene" && schedule && entryIdx === 0) {
            currentSeqRef = schedule.tracks[0].clips.map(c => c.anim);
            playScheduledSkill(schedule);
            entryBox.querySelectorAll(".body-anim").forEach(x => x.classList.remove("active"));
            btn.classList.add("active");
            return;
          }
          currentSeqRef = seq;
          resetOverlays();   // 重置开关，让本次链首 cut 起播时重新启动一遍 overlay
          player.animationState.data.defaultMix = 0.3; // 片段间平滑过渡
          player.setAnimation(seq[0], seq.length === 1 && isLoopName(seq[0]));
          seq.slice(1).forEach((n, i) => {
            player.animationState.addAnimation(0, n, i === seq.length - 2 && isLoopName(n), 0);
          });
          // 主 cut 起播 = Timeline 起点（每次点动作都重新跑一遍 Timeline）
          if (currentPart === "cutscene" && !isLoopName(seq[0])) startTimeline();
          // 切到该动作对应的背景（仅当那张已成功加载才显示，缺失则保持无背景、不报错）
          if (bgs.length && player.applyBg) {
            player._bgWant = "./" + (bgs[entryIdx] || bgs[0]);
            player.applyBg();
          }
          player.play();
          entryBox.querySelectorAll(".body-anim").forEach(x => x.classList.remove("active"));
          btn.classList.add("active");
        } catch (e) { showError("切换动作失败：" + e.message); }
      };

      entryBox.innerHTML = ""; // 清掉「加载中…」占位
      entries.forEach((seq, idx) => {
        const b = document.createElement("button");
        b.className = "item body-anim";
        // 立绘动作用友好名，技能动画按编号；悬停提示原始动画名
        b.textContent = currentPart === "cutscene"
          ? `动作${idx + 1}` + (seq.length > 1 ? `（${seq.length}段连播）` : "")
          : (IDLE_LABELS[seq[0]] || seq[0]);
        b.title = seq.join(" → ");
        b.dataset.seq = seq.join("|");
        b.onclick = () => playSeq(seq, b, idx);
        entryBox.appendChild(b);
      });

      // 表情只属于立绘模型（叠加在轨道1）。数量可能很多（有的角色 _face0.._face26 +
      // 各自的 _talk 说话版＝50 多个），平铺会把菜单撑爆。所以：可折叠分组 + 紧凑编号网格，
      // _faceN 归「表情」、_faceN_talk 归「说话版」，芯片只显示编号（hover 看原名）。
      if (currentPart === "idle" && faces.length) {
        const baseFaces = faces.filter(n => !n.endsWith("_talk"));
        const talkFaces = faces.filter(n => n.endsWith("_talk"));

        // 切表情：点已选的＝关闭（轨道1清空），否则换上（同一时刻只亮一个）
        const applyFace = (name, chip) => {
          if (!player) return;
          try {
            const wasActive = chip.classList.contains("active");
            group.querySelectorAll(".face-chip").forEach(x => x.classList.remove("active"));
            if (wasActive) player.animationState.setEmptyAnimation(1, 0.2);
            else { player.animationState.setAnimation(1, name, true); chip.classList.add("active"); }
            player.play();
          } catch (e) { showError("切换表情失败：" + e.message); }
        };

        const group = document.createElement("div");
        // 表情多（>10）默认折叠，少则展开
        group.className = "face-group" + (faces.length <= 10 ? " open" : "");
        const head = document.createElement("button");
        head.className = "face-head";
        head.innerHTML = `表情 <span>（${faces.length} 个 · 叠加可关）</span>`;
        head.onclick = () => group.classList.toggle("open");
        group.appendChild(head);

        const body = document.createElement("div");
        body.className = "face-body";
        const addGrid = (list, label) => {
          if (!list.length) return;
          const lb = document.createElement("div");
          lb.className = "sub-label"; lb.textContent = label;
          body.appendChild(lb);
          const grid = document.createElement("div");
          grid.className = "face-grid";
          list.forEach(name => {
            const c = document.createElement("button");
            c.className = "face-chip"; c.dataset.face = name;
            c.textContent = name.replace(/^_face/, "").replace(/_talk$/, "") || name;
            c.title = name;
            c.onclick = () => applyFace(name, c);
            grid.appendChild(c);
          });
          body.appendChild(grid);
        };
        addGrid(baseFaces, "表情");
        addGrid(talkFaces, "说话版");
        group.appendChild(body);
        entryBox.appendChild(group);
      }

      // 串联播放时：(1) 高亮跟随轨道0当前正在播的片段所属条目；
      // (2) 同步调度该主 cut 对应的 overlay（光效/血花/召唤物 等）到 track 2+。
      // 运镜不在这里——Timeline 是连续的，已在 playSeq 里 startTimeline() 一次性拉起。
      p.animationState.addListener({
        start: (entry) => {
          if (entry.trackIndex !== 0 || !entry.animation) return;
          const nm = entry.animation.name;
          scheduleOverlaysFor(nm);

          const btns = [...entryBox.querySelectorAll(".body-anim")];
          const heads = btns.filter(x => (x.dataset.seq || "").split("|")[0] === nm);
          btns.forEach(x => x.classList.toggle("active",
            heads.length ? heads.includes(x) : (x.dataset.seq || "").split("|").includes(nm)));
        },
      });

      // 默认播放：立绘＝待机，技能动画＝第一个条目（完整演出）
      const defIdx = currentPart === "idle"
        ? Math.max(0, entries.findIndex(seq => seq[0] === "idle"))
        : 0;
      if (entries[defIdx]) playSeq(entries[defIdx], entryBox.querySelectorAll(".body-anim")[defIdx], defIdx);
    }

    function buildTree(roster) {
      tree.innerHTML = "";
      roster.characters.forEach(char => {
        const wrap = document.createElement("div");
        wrap.className = "char";
        wrap.dataset.search = (char.name + " " + (char.aka || "") + " " + char.id).toLowerCase();

        const head = document.createElement("button");
        head.className = "item";
        head.textContent = char.name;
        head.title = "ID " + char.id;
        head.onclick = () => wrap.classList.toggle("expanded");
        wrap.appendChild(head);

        const sub = document.createElement("div");
        sub.className = "sub";

        const costumeLabel = document.createElement("div");
        costumeLabel.className = "sub-label";
        costumeLabel.textContent = "服装";
        sub.appendChild(costumeLabel);

        const animBox = document.createElement("div");

        const costumeBox = document.createElement("div");
        char.costumes.forEach(c => {
          const b = document.createElement("button");
          b.className = "item";
          b.textContent = c.label;
          b.onclick = () => selectCostume(c, b, animBox);
          costumeBox.appendChild(b);
        });
        sub.appendChild(costumeBox);
        sub.appendChild(animBox);

        wrap.appendChild(sub);
        tree.appendChild(wrap);
      });
    }

    // ── 搜索过滤 ──
    search.addEventListener("input", () => {
      const q = search.value.trim().toLowerCase();
      tree.querySelectorAll(".char").forEach(el => {
        el.classList.toggle("hidden", q && !el.dataset.search.includes(q));
      });
    });

    // ── 启动：并行加载 roster + 探测可达 CDN（Pages 上必须先定好 ASSET_BASE 再加载素材）──
    Promise.all([
      fetch("./data/roster.json?v=" + Date.now())
        .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); }),
      resolveAssetBase(),
    ])
      .then(([roster]) => {
        buildTree(roster);
        const n = roster.characters.length;
        // document.lastModified 来自服务器 Last-Modified 头＝页面部署时间，
        // 用于一眼区分「看到的是新版还是缓存的旧版」
        const built = new Date(document.lastModified).toLocaleString("zh-CN", { hour12: false });
        document.getElementById("footer").innerHTML =
          `${n} 个角色 · ${roster.source}<br>页面版本：${built} · 素材源：${cdnHostUsed}<br>双击画面切换全屏 · 鼠标移到左缘呼出菜单`;
        // 默认加载第一个角色的第一套服装
        const firstChar = tree.querySelector(".char");
        if (firstChar) {
          firstChar.classList.add("expanded");
          const firstCostume = firstChar.querySelector(".sub .item");
          if (firstCostume) firstCostume.click();
        }
      })
      .catch(e => showError("roster.json 加载失败（先运行 tools/sync.sh）：" + e.message));

    // ── 抽屉交互 ──
    const hotzone = document.getElementById("edge-hotzone");
    hotzone.addEventListener("mouseenter", () => drawer.classList.add("open"));
    drawer.addEventListener("mouseleave", () => drawer.classList.remove("open"));

    // ── 鼠标静止后隐藏光标与把手 ──
    let idleTimer = null;
    document.addEventListener("mousemove", () => {
      document.body.classList.add("mouse-active");
      document.body.classList.remove("idle");
      clearTimeout(idleTimer);
      idleTimer = setTimeout(() => {
        document.body.classList.remove("mouse-active");
        if (!drawer.classList.contains("open")) document.body.classList.add("idle");
      }, 2500);
    });

    // ── 双击全屏 ──
    stage.addEventListener("dblclick", () => {
      if (document.fullscreenElement) document.exitFullscreen();
      else document.documentElement.requestFullscreen();
    });
  </script>
</body>
</html>
